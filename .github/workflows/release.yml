name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag or version to publish, such as v1.6.0 or 1.6.0
        required: true
        type: string

concurrency:
  # Serialize release runs so newer commits queue behind in-flight releases.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.manual.outputs.release_created }}
      tag: ${{ steps.release.outputs.tag_name || steps.manual.outputs.tag }}
      version: ${{ steps.release.outputs.version || steps.manual.outputs.version }}
      sha: ${{ steps.release.outputs.sha || steps.manual.outputs.sha }}
      trusted_main_sha: ${{ steps.trusted_main.outputs.trusted_main_sha }}
    steps:
      - name: Resolve trusted main workflow revision
        id: trusted_main
        env:
          PATH: /usr/bin:/bin
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        run: |
          expected_workflow_ref="${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/heads/main"
          if [ "${WORKFLOW_REF}" != "${expected_workflow_ref}" ]; then
            echo "::error::Release workflow must come from ${expected_workflow_ref}; got ${WORKFLOW_REF}." >&2
            exit 1
          fi
          if [[ ! "${WORKFLOW_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Release workflow SHA must be a lowercase full 40-character commit SHA; got ${WORKFLOW_SHA}." >&2
            exit 1
          fi
          /usr/bin/printf 'trusted_main_sha=%s\n' "${WORKFLOW_SHA}" >> "$GITHUB_OUTPUT"

      - name: Run release-please
        if: ${{ github.event_name != 'workflow_dispatch' }}
        id: release
        uses: googleapis/release-please-action@0dfd8538845b8e92600d271a895a5372865d4062
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.MAIN_SYNC_PAT || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout release metadata
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare manual release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: manual
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          tag="$(printf '%s' "${INPUT_TAG}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          if [ -z "${tag}" ]; then
            echo "::error::tag input is required for manual release promotion."
            exit 1
          fi
          if [[ "${tag}" != v* ]]; then
            tag="v${tag}"
          fi
          if ! git check-ref-format --normalize "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::tag input must be a valid Git tag name." >&2
            exit 1
          fi

          encoded_tag="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$tag")"
          release_metadata_file="$(mktemp)"
          release_lookup_error="$(mktemp)"
          trap 'rm -f "${release_metadata_file}" "${release_lookup_error}"' EXIT
          set +e
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${encoded_tag}" >"${release_metadata_file}" 2>"${release_lookup_error}"
          release_lookup_status=$?
          set -e
          if [ "${release_lookup_status}" -ne 0 ]; then
            if grep -q "HTTP 404" "${release_lookup_error}"; then
              if ! gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/releases" \
                | jq -c --arg tag "$tag" '.[].[] | select(.tag_name == $tag)' \
                | head -n1 >"${release_metadata_file}"; then
                echo "::error::Failed to search draft GitHub releases for ${tag}." >&2
                exit 1
              fi
            else
              cat "${release_lookup_error}" >&2
              echo "::error::Failed to look up GitHub release ${tag}." >&2
              exit "${release_lookup_status}"
            fi
          fi
          if ! [ -s "${release_metadata_file}" ]; then
            echo "::error::Manual release promotion can only retry an existing GitHub release for ${tag}." >&2
            exit 1
          fi

          echo "Reusing existing GitHub release ${tag}."
          release_ref_json="$(mktemp)"
          if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${encoded_tag}" >"${release_ref_json}" 2>/dev/null; then
            echo "::error::Existing release ${tag} tag ref could not be verified." >&2
            rm -f "${release_ref_json}"
            exit 1
          fi

          existing_ref_type="$(jq -r '.object.type // empty' "${release_ref_json}")"
          existing_ref_sha="$(jq -r '.object.sha // empty' "${release_ref_json}")"
          existing_commit=""

          case "${existing_ref_type}" in
            commit)
              existing_commit="${existing_ref_sha}"
              ;;
            tag)
              annotated_tag_json="$(mktemp)"
              if ! gh api "repos/${GITHUB_REPOSITORY}/git/tags/${existing_ref_sha}" >"${annotated_tag_json}" 2>/dev/null; then
                echo "::error::Existing release ${tag} annotated tag target could not be verified." >&2
                rm -f "${annotated_tag_json}" "${release_ref_json}"
                exit 1
              fi

              annotated_target_type="$(jq -r '.object.type // empty' "${annotated_tag_json}")"
              if [ "${annotated_target_type}" != "commit" ]; then
                echo "::error::Existing release ${tag} tag target type ${annotated_target_type} is not a commit." >&2
                rm -f "${annotated_tag_json}" "${release_ref_json}"
                exit 1
              fi

              existing_commit="$(jq -r '.object.sha // empty' "${annotated_tag_json}")"
              rm -f "${annotated_tag_json}"
              ;;
            *)
              echo "::error::Existing release ${tag} tag ref type ${existing_ref_type} is not supported." >&2
              rm -f "${release_ref_json}"
              exit 1
              ;;
          esac

          rm -f "${release_ref_json}"
          if [ -z "${existing_commit}" ]; then
            echo "::error::Existing release ${tag} target commit could not be verified." >&2
            exit 1
          fi
          resolved_sha="${existing_commit}"

          {
            echo "release_created=true"
            echo "tag=${tag}"
            echo "version=${tag#v}"
            echo "sha=${resolved_sha}"
          } >> "$GITHUB_OUTPUT"

  orchestrate-release:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/release-orchestration.yml
    with:
      tag: ${{ needs.prepare-release.outputs.tag }}
      source_sha: ${{ needs.prepare-release.outputs.sha }}
      artifact_prefix: release
      build_channel: release
      image_tags: |
        ${{ needs.prepare-release.outputs.tag }}
        latest

  build-vscode-extension:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          ref: ${{ needs.prepare-release.outputs.sha }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: extensions/vscode-lopper/package-lock.json

      - name: Build local lopper binary
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          version="${RELEASE_TAG#v}"
          make build VERSION="$version" BUILD_CHANNEL=release

      - name: Install extension dependencies
        run: make vscode-extension-install

      - name: Run VS Code smoke tests
        run: xvfb-run -a make vscode-extension-test

      - name: Sync VS Code extension version
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          make sync-version VERSION="$version"

      - name: Reset VS Code extension artifact staging
        env:
          PATH: /usr/bin:/bin
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        run: |
          set -euo pipefail
          rm -rf -- dist
          mkdir dist

      - name: Package VS Code extension
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          cd extensions/vscode-lopper
          npx @vscode/vsce package --out "../../dist/lopper-vscode-${version}.vsix"

      - name: Validate VS Code extension artifact
        env:
          PATH: /usr/bin:/bin
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        run: |
          set -euo pipefail
          expected="dist/lopper-vscode-${RELEASE_VERSION}.vsix"
          if find -P dist -mindepth 1 -maxdepth 1 ! -type f -print -quit | grep -q .; then
            echo "VS Code artifact staging contains a non-regular entry" >&2
            exit 1
          fi
          if [ ! -f "${expected}" ] || [ -L "${expected}" ]; then
            echo "Expected VS Code artifact ${expected} is missing or not a regular file" >&2
            exit 1
          fi
          if [ ! -s "${expected}" ]; then
            echo "Expected VS Code artifact ${expected} is empty" >&2
            exit 1
          fi
          if [ "$(find -P dist -mindepth 1 -maxdepth 1 -type f | wc -l)" -ne 1 ]; then
            echo "VS Code artifact staging must contain only ${expected}" >&2
            exit 1
          fi

      - name: Upload VS Code extension artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-vscode-extension
          path: dist/lopper-vscode-${{ needs.prepare-release.outputs.version }}.vsix
          if-no-files-found: error

  build-darwin-amd64:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: macos-26-intel
    permissions:
      contents: read
    steps:
      - name: Checkout release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          ref: ${{ needs.prepare-release.outputs.sha }}

      - name: Compute build metadata
        id: build_meta
        run: |
          echo "commit=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Assert Darwin amd64 host
        shell: bash
        run: |
          set -euo pipefail
          host_goarch="$(go env GOARCH)"
          if [ "${host_goarch}" != "amd64" ]; then
            echo "::error::Expected darwin/amd64 runner, got darwin/${host_goarch}."
            exit 1
          fi

      - name: Install shellcheck
        run: brew install shellcheck

      - name: Install Go tooling
        run: |
          make tools-install
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Reset Darwin amd64 artifact staging
        env:
          PATH: /usr/bin:/bin
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        run: |
          set -euo pipefail
          rm -rf -- dist
          mkdir dist

      - name: Build Darwin amd64 release artifact
        env:
          TAG: ${{ needs.prepare-release.outputs.tag }}
          COMMIT_SHA: ${{ steps.build_meta.outputs.commit }}
          BUILD_DATE: ${{ steps.build_meta.outputs.build_date }}
        run: |
          make release \
            VERSION="$TAG" \
            GIT_COMMIT="$COMMIT_SHA" \
            BUILD_DATE="$BUILD_DATE" \
            RELEASE_BUILD_CHANNEL=release \
            PLATFORMS="darwin/amd64"

      - name: Validate Darwin amd64 release artifact
        env:
          PATH: /usr/bin:/bin
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        run: |
          set -euo pipefail
          expected=("dist/lopper_${RELEASE_TAG}_darwin_amd64.tar.gz")
          if find -P dist -mindepth 1 -maxdepth 1 ! -type f -print -quit | grep -q .; then
            echo "Darwin amd64 artifact staging contains a non-regular entry" >&2
            exit 1
          fi
          file_count="$(find -P dist -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d '[:space:]')"
          if [ "${file_count}" -ne "${#expected[@]}" ]; then
            echo "Darwin amd64 artifact staging contains an unexpected file count" >&2
            exit 1
          fi
          for artifact in "${expected[@]}"; do
            if [ ! -f "${artifact}" ] || [ -L "${artifact}" ]; then
              echo "Expected Darwin amd64 artifact ${artifact} is missing or not a regular file" >&2
              exit 1
            fi
            if [ ! -s "${artifact}" ]; then
              echo "Expected Darwin amd64 artifact ${artifact} is empty" >&2
              exit 1
            fi
          done

      - name: Upload Darwin amd64 artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-darwin-amd64
          path: dist/lopper_${{ needs.prepare-release.outputs.tag }}_darwin_amd64.tar.gz
          if-no-files-found: error

  prepare-release-feature-report:
    needs:
      - prepare-release
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.sha }}

      - name: Verify release source checkout
        env:
          EXPECTED_SOURCE_SHA: ${{ needs.prepare-release.outputs.sha }}
        run: |
          set -euo pipefail
          actual_source_sha="$(git rev-parse HEAD)"
          if [ "${actual_source_sha}" != "${EXPECTED_SOURCE_SHA}" ]; then
            echo "Checked out release source ${actual_source_sha} does not match ${EXPECTED_SOURCE_SHA}" >&2
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Generate feature flag release report
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          report_dir="${RUNNER_TEMP}/release-feature-report"
          rm -rf -- "${report_dir}"
          mkdir -- "${report_dir}"
          git fetch --tags --force
          previous_tag=""
          while IFS= read -r candidate; do
            if [ "${candidate}" != "${RELEASE_TAG}" ]; then
              previous_tag="${candidate}"
              break
            fi
          done < <(git tag --list 'v[0-9]*' --sort=-v:refname)

          rm -rf -- .artifacts
          mkdir -- .artifacts
          args=(report --channel release --release "${RELEASE_TAG}")
          if [ -n "${previous_tag}" ]; then
            previous_catalog=".artifacts/previous-features.json"
            if git cat-file -e "${previous_tag}:internal/featureflags/features.json" 2>/dev/null; then
              git show "${previous_tag}:internal/featureflags/features.json" > "${previous_catalog}"
            else
              printf '[]\n' > "${previous_catalog}"
            fi
            args+=(--previous-catalog "${previous_catalog}")
          fi
          go run ./tools/featureflag "${args[@]}" > "${report_dir}/feature-flags.md"

      - name: Validate feature flag release report
        env:
          PATH: /usr/bin:/bin
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        run: |
          set -euo pipefail
          report_dir="${RUNNER_TEMP}/release-feature-report"
          report="${report_dir}/feature-flags.md"
          if find -P "${report_dir}" -mindepth 1 -maxdepth 1 ! -type f -print -quit | grep -q .; then
            echo "Feature flag release report staging contains a non-regular entry" >&2
            exit 1
          fi
          file_count="$(find -P "${report_dir}" -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d '[:space:]')"
          if [ "${file_count}" -ne 1 ]; then
            echo "Feature flag release report staging must contain exactly one file" >&2
            exit 1
          fi
          if [ ! -f "${report}" ] || [ -L "${report}" ]; then
            echo "Feature flag release report must be a regular file" >&2
            exit 1
          fi
          if [ ! -s "${report}" ]; then
            echo "Feature flag release report must not be empty" >&2
            exit 1
          fi
          if [ "$(stat --format=%s "${report}")" -gt 1048576 ]; then
            echo "Feature flag release report exceeds the 1 MiB publication limit" >&2
            exit 1
          fi

      - name: Upload feature flag release report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: stable-feature-report
          path: ${{ runner.temp }}/release-feature-report/feature-flags.md
          if-no-files-found: error

  prepare-release-publication:
    needs:
      - prepare-release
      - prepare-release-feature-report
      - orchestrate-release
      - build-vscode-extension
      - build-darwin-amd64
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Reset release publication assembly
        env:
          PATH: /usr/bin:/bin
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        run: |
          set -euo pipefail
          assembly_root="${RUNNER_TEMP}/release-publication-assembly"
          rm -rf -- "${assembly_root}"
          rm -rf -- publication-inputs
          mkdir -- "${assembly_root}"

      - name: Download feature flag release report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: stable-feature-report
          path: ${{ runner.temp }}/release-publication-assembly/feature-report

      - name: Download Linux and Windows release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-linux-windows
          path: ${{ runner.temp }}/release-publication-assembly/linux-windows

      - name: Download Darwin arm64 release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-darwin
          path: ${{ runner.temp }}/release-publication-assembly/darwin-arm64

      - name: Download Darwin amd64 release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-darwin-amd64
          path: ${{ runner.temp }}/release-publication-assembly/darwin-amd64

      - name: Download VS Code extension release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-vscode-extension
          path: ${{ runner.temp }}/release-publication-assembly/vscode

      - name: Stage bounded release publication inputs
        env:
          ASSEMBLY_ROOT: ${{ runner.temp }}/release-publication-assembly
          PATH: /usr/bin:/bin
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          report="${ASSEMBLY_ROOT}/feature-report/feature-flags.md"
          linux_windows_assets=(
            "${ASSEMBLY_ROOT}/linux-windows/lopper_${RELEASE_TAG}_linux_amd64.tar.gz"
            "${ASSEMBLY_ROOT}/linux-windows/lopper_${RELEASE_TAG}_linux_arm64.tar.gz"
            "${ASSEMBLY_ROOT}/linux-windows/lopper_${RELEASE_TAG}_windows_amd64.zip"
            "${ASSEMBLY_ROOT}/linux-windows/lopper_${RELEASE_TAG}_windows_arm64.zip"
          )
          darwin_arm64_assets=("${ASSEMBLY_ROOT}/darwin-arm64/lopper_${RELEASE_TAG}_darwin_arm64.tar.gz")
          darwin_amd64_assets=("${ASSEMBLY_ROOT}/darwin-amd64/lopper_${RELEASE_TAG}_darwin_amd64.tar.gz")
          vsix_assets=("${ASSEMBLY_ROOT}/vscode/lopper-vscode-${version}.vsix")
          assets=(
            "${linux_windows_assets[@]}"
            "${darwin_arm64_assets[@]}"
            "${darwin_amd64_assets[@]}"
            "${vsix_assets[@]}"
          )
          expected_assets=(
            "dist/lopper_${RELEASE_TAG}_linux_amd64.tar.gz"
            "dist/lopper_${RELEASE_TAG}_linux_arm64.tar.gz"
            "dist/lopper_${RELEASE_TAG}_windows_amd64.zip"
            "dist/lopper_${RELEASE_TAG}_windows_arm64.zip"
            "dist/lopper_${RELEASE_TAG}_darwin_amd64.tar.gz"
            "dist/lopper_${RELEASE_TAG}_darwin_arm64.tar.gz"
            "dist/lopper-vscode-${version}.vsix"
          )

          validate_input_root() {
            local root="$1"
            local maximum_size="$2"
            shift 2
            local expected=("$@")
            if [ ! -d "${root}" ] || [ -L "${root}" ]; then
              echo "Release input root ${root} is missing or invalid" >&2
              exit 1
            fi
            if find -P "${root}" -mindepth 1 -maxdepth 1 ! -type f -print -quit | grep -q .; then
              echo "Release input root ${root} contains a non-regular entry" >&2
              exit 1
            fi
            local file_count
            file_count="$(find -P "${root}" -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d '[:space:]')"
            if [ "${file_count}" -ne "${#expected[@]}" ]; then
              echo "Release input root ${root} contains an unexpected file count" >&2
              exit 1
            fi
            local input
            for input in "${expected[@]}"; do
              if [ ! -f "${input}" ] || [ -L "${input}" ]; then
                echo "Expected release input ${input} is missing or not a regular file" >&2
                exit 1
              fi
              if [ ! -s "${input}" ]; then
                echo "Expected release input ${input} is empty" >&2
                exit 1
              fi
              if [ "$(stat --format=%s "${input}")" -gt "${maximum_size}" ]; then
                echo "Release input ${input} exceeds its publication limit" >&2
                exit 1
              fi
            done
          }

          validate_input_root "${ASSEMBLY_ROOT}/feature-report" 1048576 "${report}"
          validate_input_root "${ASSEMBLY_ROOT}/linux-windows" 1073741824 "${linux_windows_assets[@]}"
          validate_input_root "${ASSEMBLY_ROOT}/darwin-arm64" 1073741824 "${darwin_arm64_assets[@]}"
          validate_input_root "${ASSEMBLY_ROOT}/darwin-amd64" 1073741824 "${darwin_amd64_assets[@]}"
          validate_input_root "${ASSEMBLY_ROOT}/vscode" 1073741824 "${vsix_assets[@]}"

          rm -rf -- publication-inputs
          mkdir -p publication-inputs/dist
          cp -- "${assets[@]}" publication-inputs/dist/
          cp -- "${report}" publication-inputs/feature-flags.md
          if find -P publication-inputs -mindepth 1 ! -type f ! -type d -print -quit | grep -q .; then
            echo "Staged release publication inputs contain a non-regular entry" >&2
            exit 1
          fi
          if [ "$(find -P publication-inputs -type f | wc -l | tr -d '[:space:]')" -ne 8 ]; then
            echo "Staged release publication inputs must contain seven assets and one report" >&2
            exit 1
          fi
          for asset in "${expected_assets[@]}"; do
            asset="publication-inputs/${asset}"
            if [ ! -f "${asset}" ] || [ -L "${asset}" ] || [ ! -s "${asset}" ]; then
              echo "Staged release asset ${asset} is missing, invalid, or empty" >&2
              exit 1
            fi
          done
          if [ ! -f publication-inputs/feature-flags.md ] || [ -L publication-inputs/feature-flags.md ] || [ ! -s publication-inputs/feature-flags.md ]; then
            echo "Staged feature flag release report is missing, invalid, or empty" >&2
            exit 1
          fi
          (
            cd publication-inputs
            manifest_inputs=("feature-flags.md" "${expected_assets[@]}")
            mapfile -d '' sorted_manifest_inputs < <(printf '%s\0' "${manifest_inputs[@]}" | sort -z)
            sha256sum "${sorted_manifest_inputs[@]}" > SHA256SUMS
          )

      - name: Upload release publication inputs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: publication-inputs
          path: publication-inputs
          if-no-files-found: error

  prepare-marketplace-toolchain:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      configured: ${{ steps.gate.outputs.configured }}
    steps:
      - name: Detect Marketplace token
        id: gate
        env:
          VSCE_PUBLISH: ${{ secrets.VSCE_PUBLISH }}
          PATH: /usr/bin:/bin
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        run: |
          if [ -n "${VSCE_PUBLISH:-}" ]; then
            /usr/bin/printf '%s\n' 'configured=true' >> "$GITHUB_OUTPUT"
          else
            /usr/bin/printf '%s\n' 'configured=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Marketplace toolchain prep when token is missing
        if: ${{ steps.gate.outputs.configured != 'true' }}
        run: echo "VSCE publish token not configured; skipping Marketplace toolchain preparation."

      - name: Checkout trusted main Marketplace manifests
        if: ${{ steps.gate.outputs.configured == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          ref: ${{ needs.prepare-release.outputs.trusted_main_sha }}

      - name: Setup Node for Marketplace tooling
        if: ${{ steps.gate.outputs.configured == 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Validate Marketplace tooling lockfile
        if: ${{ steps.gate.outputs.configured == 'true' }}
        run: |
          set -euo pipefail
          lockfile="extensions/vscode-lopper/package-lock.json"
          if [ ! -f "${lockfile}" ] || [ -L "${lockfile}" ]; then
            echo "Marketplace tooling lockfile is missing or invalid" >&2
            exit 1
          fi

          vsce_version="$(jq -er '.packages["node_modules/@vscode/vsce"].version' "${lockfile}")"
          vsce_integrity="$(jq -er '.packages["node_modules/@vscode/vsce"].integrity' "${lockfile}")"
          if [ "${vsce_version}" != "3.9.2" ]; then
            echo "Marketplace tooling lockfile must pin @vscode/vsce 3.9.2" >&2
            exit 1
          fi
          case "${vsce_integrity}" in
            sha512-?*) ;;
            *)
              echo "Marketplace tooling lockfile must pin @vscode/vsce integrity" >&2
              exit 1
              ;;
          esac

      - name: Prepare integrity-bound Marketplace toolchain
        if: ${{ steps.gate.outputs.configured == 'true' }}
        run: |
          set -euo pipefail
          source_dir="extensions/vscode-lopper"
          scratch_dir="${RUNNER_TEMP}/marketplace-toolchain"
          rm -rf "${scratch_dir}"
          mkdir -p "${scratch_dir}"
          chmod 0700 "${scratch_dir}"
          cp -- "${source_dir}/package.json" "${source_dir}/package-lock.json" "${scratch_dir}/"

          if [ "$(find "${scratch_dir}" -mindepth 1 -maxdepth 1 -type f | wc -l)" -ne 2 ]; then
            echo "Marketplace scratch directory must contain exactly two package manifests" >&2
            exit 1
          fi
          if find "${scratch_dir}" -mindepth 1 -maxdepth 1 \( ! -type f -o \( ! -name package.json ! -name package-lock.json \) \) -print -quit | grep -q .; then
            echo "Marketplace scratch directory contains an unexpected path" >&2
            exit 1
          fi

          (
            cd "${scratch_dir}"
            npm ci --ignore-scripts --include=dev --audit=false --fund=false
          )
          if ! cmp --silent "${source_dir}/package.json" "${scratch_dir}/package.json" ||
            ! cmp --silent "${source_dir}/package-lock.json" "${scratch_dir}/package-lock.json"; then
            echo "Marketplace package manifests changed during preparation" >&2
            exit 1
          fi
          trusted_vsce_link="${scratch_dir}/node_modules/.bin/vsce"
          find "${scratch_dir}/node_modules" -type l ! -path "${trusted_vsce_link}" -delete
          if find "${scratch_dir}/node_modules" -type l ! -path "${trusted_vsce_link}" -print -quit | grep -q .; then
            echo "Marketplace toolchain retains unexpected symbolic links" >&2
            exit 1
          fi
          test -x "${scratch_dir}/node_modules/.bin/vsce"
          if [ "$(realpath -e "${scratch_dir}/node_modules/.bin/vsce")" != "$(realpath -e "${scratch_dir}/node_modules/@vscode/vsce/vsce")" ]; then
            echo "Marketplace VSCE launcher resolves outside the locked package" >&2
            exit 1
          fi

      - name: Archive Marketplace toolchain
        if: ${{ steps.gate.outputs.configured == 'true' }}
        run: |
          set -euo pipefail
          scratch_dir="${RUNNER_TEMP}/marketplace-toolchain"
          archive_dir="${GITHUB_WORKSPACE}/.artifacts/marketplace-toolchain"
          archive_file="${archive_dir}/vsce-toolchain.tar.gz"
          rm -rf "${archive_dir}"
          mkdir -p "${archive_dir}"
          chmod 0700 "${archive_dir}"
          tar --create --gzip --file "${archive_file}" --directory "${scratch_dir}" package.json package-lock.json node_modules
          if [ ! -s "${archive_file}" ] || [ -L "${archive_file}" ] || [ "$(stat --format=%s "${archive_file}")" -gt 268435456 ]; then
            echo "Marketplace toolchain archive is missing, invalid, or larger than 256 MiB" >&2
            exit 1
          fi
          (
            cd "${archive_dir}"
            sha256sum vsce-toolchain.tar.gz > SHA256SUMS
          )

      - name: Upload Marketplace toolchain
        if: ${{ steps.gate.outputs.configured == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: marketplace-toolchain
          path: |
            .artifacts/marketplace-toolchain/vsce-toolchain.tar.gz
            .artifacts/marketplace-toolchain/SHA256SUMS
          if-no-files-found: error
          include-hidden-files: true
          overwrite: true

  publish-marketplace:
    needs:
      - prepare-release
      - publish
      - prepare-release-publication
      - prepare-marketplace-toolchain
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Skip Marketplace publish when token is missing
        if: ${{ needs.prepare-marketplace-toolchain.outputs.configured != 'true' }}
        run: echo "VSCE publish token not configured; skipping Marketplace publish."

      - name: Setup Node for Marketplace tooling
        if: ${{ needs.prepare-marketplace-toolchain.outputs.configured == 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Download release publication inputs
        if: ${{ needs.prepare-marketplace-toolchain.outputs.configured == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: publication-inputs
          path: publication-inputs

      - name: Download Marketplace toolchain
        if: ${{ needs.prepare-marketplace-toolchain.outputs.configured == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: marketplace-toolchain
          path: marketplace-toolchain-input

      - name: Validate Marketplace publication inputs
        if: ${{ needs.prepare-marketplace-toolchain.outputs.configured == 'true' }}
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          publication_dir="${GITHUB_WORKSPACE}/publication-inputs"
          artifact_dir="${GITHUB_WORKSPACE}/marketplace-toolchain-input"
          archive_file="${artifact_dir}/vsce-toolchain.tar.gz"
          toolchain_dir="${RUNNER_TEMP}/vsce-toolchain"
          expected_vsix="lopper-vscode-${RELEASE_VERSION}.vsix"

          if find "${publication_dir}" -mindepth 1 ! -type f ! -type d -print -quit | grep -q .; then
            echo "Marketplace publication inputs contain a symlink or special file" >&2
            exit 1
          fi
          if [ "$(find "${publication_dir}" -mindepth 1 -maxdepth 1 | wc -l)" -ne 3 ] ||
            [ ! -d "${publication_dir}/dist" ] || [ -L "${publication_dir}/dist" ] ||
            [ ! -f "${publication_dir}/feature-flags.md" ] || [ -L "${publication_dir}/feature-flags.md" ] ||
            [ ! -f "${publication_dir}/SHA256SUMS" ] || [ -L "${publication_dir}/SHA256SUMS" ]; then
            echo "Marketplace publication inputs have an unexpected top-level layout" >&2
            exit 1
          fi
          if find "${publication_dir}" -mindepth 1 -maxdepth 1 ! -name dist ! -name feature-flags.md ! -name SHA256SUMS -print -quit | grep -q .; then
            echo "Marketplace publication inputs contain an unexpected path" >&2
            exit 1
          fi
          if find "${publication_dir}/dist" -mindepth 1 -maxdepth 1 ! -type f -print -quit | grep -q .; then
            echo "Marketplace publication asset directory contains an unexpected path" >&2
            exit 1
          fi
          if [ "$(stat --format=%s "${publication_dir}/feature-flags.md")" -gt 1048576 ] ||
            [ "$(stat --format=%s "${publication_dir}/SHA256SUMS")" -gt 65536 ]; then
            echo "Marketplace publication metadata exceeds its size limit" >&2
            exit 1
          fi

          mapfile -t assets < <(find "${publication_dir}/dist" -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.vsix' \) -print | sort)
          if [ "${#assets[@]}" -eq 0 ] || [ "${#assets[@]}" -gt 32 ]; then
            echo "Expected between 1 and 32 Marketplace publication assets, found ${#assets[@]}" >&2
            exit 1
          fi
          if [ "$(find "${publication_dir}/dist" -maxdepth 1 -type f | wc -l)" -ne "${#assets[@]}" ] ||
            [ "$(find "${publication_dir}" -type f | wc -l)" -ne "$(( ${#assets[@]} + 2 ))" ]; then
            echo "Marketplace publication inputs contain an unexpected file" >&2
            exit 1
          fi
          if find "${publication_dir}/dist" -maxdepth 1 -type f -printf '%f\n' | grep -q '[[:space:]]'; then
            echo "Marketplace publication asset names must not contain whitespace" >&2
            exit 1
          fi
          if [ "$(find "${publication_dir}/dist" -maxdepth 1 -type f -name 'lopper-vscode-*.vsix' | wc -l)" -ne 1 ] ||
            [ ! -f "${publication_dir}/dist/${expected_vsix}" ]; then
            echo "Expected exactly one VSIX asset named ${expected_vsix}" >&2
            exit 1
          fi
          for asset in "${assets[@]}"; do
            if [ ! -s "${asset}" ]; then
              echo "Marketplace publication asset ${asset} is empty" >&2
              exit 1
            fi
            if [ "$(stat --format=%s "${asset}")" -gt 1073741824 ]; then
              echo "Marketplace publication asset ${asset} exceeds the 1 GiB limit" >&2
              exit 1
            fi
          done

          vsix_path="${publication_dir}/dist/${expected_vsix}"
          python3 - "${vsix_path}" "${RELEASE_VERSION}" <<'PY'
          import json
          import posixpath
          import stat
          import sys
          import zipfile

          vsix_path = sys.argv[1]
          expected_version = sys.argv[2]
          manifest_path = "extension/package.json"

          with zipfile.ZipFile(vsix_path) as archive:
              infos = archive.infolist()
              if len(infos) == 0 or len(infos) > 65536:
                  raise SystemExit("Marketplace VSIX contains an unexpected number of entries")

              total_size = 0
              seen_names = set()
              manifest_entries = []
              for info in infos:
                  raw_name = info.filename
                  normalized_name = posixpath.normpath(raw_name)
                  if raw_name.startswith("/") or not normalized_name or normalized_name == "." or ".." in normalized_name.split("/"):
                      raise SystemExit(f"Marketplace VSIX contains an unsafe path: {raw_name}")

                  mode = (info.external_attr >> 16) & 0o170000
                  if stat.S_ISLNK(mode):
                      raise SystemExit(f"Marketplace VSIX contains a symbolic link entry: {raw_name}")
                  if mode and not (stat.S_ISDIR(mode) or stat.S_ISREG(mode)):
                      raise SystemExit(f"Marketplace VSIX contains an unexpected entry type: {raw_name}")

                  if normalized_name in seen_names:
                      raise SystemExit(f"Marketplace VSIX contains a duplicate path: {raw_name}")
                  seen_names.add(normalized_name)

                  total_size += info.file_size
                  if total_size > 1073741824:
                      raise SystemExit("Marketplace VSIX exceeds the 1 GiB expanded size limit")

                  if normalized_name == manifest_path:
                      manifest_entries.append(info)

              if len(manifest_entries) != 1:
                  raise SystemExit("Marketplace VSIX must contain exactly one extension/package.json manifest")

              manifest_info = manifest_entries[0]
              if manifest_info.is_dir() or manifest_info.file_size > 1048576:
                  raise SystemExit("Marketplace VSIX manifest is missing or oversized")

              manifest = json.loads(archive.read(manifest_info).decode("utf-8"))

          if manifest.get("publisher") != "BenRanford":
              raise SystemExit("Marketplace VSIX publisher does not match BenRanford")
          if manifest.get("name") != "vscode-lopper":
              raise SystemExit("Marketplace VSIX name does not match vscode-lopper")
          if manifest.get("version") != expected_version:
              raise SystemExit(f"Marketplace VSIX version does not match {expected_version}")
          PY

          expected_paths="$(mktemp)"
          manifest_paths="$(mktemp)"
          trap 'rm -f "${expected_paths}" "${manifest_paths}"' EXIT
          (
            cd "${publication_dir}"
            {
              printf '%s\n' feature-flags.md
              find dist -maxdepth 1 -type f -print
            } | sort > "${expected_paths}"
            if grep -Ev '^[0-9a-f]{64}  (feature-flags[.]md|dist/[A-Za-z0-9._+-]+([.]tar[.]gz|[.]zip|[.]vsix))$' SHA256SUMS | grep -q .; then
              echo "Marketplace publication checksum manifest contains an unexpected path" >&2
              exit 1
            fi
            awk '{print $2}' SHA256SUMS | sort > "${manifest_paths}"
            if ! cmp --silent "${expected_paths}" "${manifest_paths}"; then
              echo "Marketplace publication checksum manifest does not cover the exact file set" >&2
              exit 1
            fi
            sha256sum --check --strict SHA256SUMS
          )

          if find "${artifact_dir}" -mindepth 1 -maxdepth 1 ! -type f -print -quit | grep -q .; then
            echo "Marketplace toolchain artifact contains a symlink or unexpected path" >&2
            exit 1
          fi
          if [ "$(find "${artifact_dir}" -maxdepth 1 -type f | wc -l)" -ne 2 ]; then
            echo "Marketplace toolchain artifact must contain exactly an archive and checksum manifest" >&2
            exit 1
          fi
          if [ ! -s "${archive_file}" ] || [ ! -f "${artifact_dir}/SHA256SUMS" ]; then
            echo "Marketplace toolchain artifact is missing or empty" >&2
            exit 1
          fi
          if [ "$(stat --format=%s "${archive_file}")" -gt 268435456 ]; then
            echo "Marketplace toolchain archive exceeds the 256 MiB limit" >&2
            exit 1
          fi
          if [ "$(stat --format=%s "${artifact_dir}/SHA256SUMS")" -gt 1024 ]; then
            echo "Marketplace toolchain checksum manifest exceeds its size limit" >&2
            exit 1
          fi
          if [ "$(wc -l < "${artifact_dir}/SHA256SUMS")" -ne 1 ] ||
            ! grep -Eq '^[0-9a-f]{64}  vsce-toolchain[.]tar[.]gz$' "${artifact_dir}/SHA256SUMS"; then
            echo "Marketplace toolchain checksum manifest is invalid" >&2
            exit 1
          fi
          (
            cd "${artifact_dir}"
            sha256sum --check --strict SHA256SUMS
          )

          python3 - "${archive_file}" <<'PY'
          from pathlib import PurePosixPath
          import sys
          import tarfile

          archive_path = sys.argv[1]
          allowed_roots = {"package.json", "package-lock.json", "node_modules"}
          manifest_names = {"package.json", "package-lock.json"}
          trusted_symlink = ("node_modules/.bin/vsce", "../@vscode/vsce/vsce")
          required_regular = {
              "package.json",
              "package-lock.json",
              "node_modules/@vscode/vsce/vsce",
          }

          with tarfile.open(archive_path, "r:gz") as archive:
              members = archive.getmembers()

          member_count = len(members)
          total_size = 0
          names = set()
          regular_files = set()
          symlinks = {}
          for member in members:
              raw_name = member.name
              if "\\" in raw_name:
                  raise SystemExit("Marketplace toolchain archive contains a backslash path")
              components = raw_name.split("/")
              if not raw_name or raw_name.startswith("/") or any(component in ("", ".", "..") for component in components):
                  raise SystemExit("Marketplace toolchain archive contains an unsafe path")
              path = PurePosixPath(raw_name)
              name = str(path)
              if raw_name != name:
                  raise SystemExit("Marketplace toolchain archive contains an unsafe path")
              if name in names:
                  raise SystemExit("Marketplace toolchain archive contains a duplicate path")
              root = name.split("/", 1)[0]
              if root not in allowed_roots or (root in manifest_names and name != root):
                  raise SystemExit("Marketplace toolchain archive contains an unexpected path")
              names.add(name)

              if root in manifest_names and not member.isfile():
                  raise SystemExit("Marketplace toolchain archive contains an unexpected entry type")
              if member.isfile():
                  total_size += member.size
                  regular_files.add(name)
                  continue
              if member.isdir():
                  continue
              if member.issym():
                  if (name, member.linkname) != trusted_symlink:
                      raise SystemExit("Marketplace toolchain archive contains a symbolic link")
                  symlinks[name] = "node_modules/@vscode/vsce/vsce"
                  continue
              if member.islnk() or not (member.isfile() or member.isdir()):
                  raise SystemExit("Marketplace toolchain archive contains an unsupported file type")

          if member_count < 3 or member_count > 65536:
              raise SystemExit("Marketplace toolchain archive has an invalid entry count")
          if total_size > 1073741824:
              raise SystemExit("Marketplace toolchain archive exceeds the 1 GiB expanded size limit")
          if not required_regular.issubset(regular_files):
              raise SystemExit("Marketplace toolchain archive is missing a required regular file")
          if symlinks.get("node_modules/.bin/vsce") != "node_modules/@vscode/vsce/vsce":
              raise SystemExit("Marketplace VSCE launcher does not target the locked package")
          PY

          rm -rf "${toolchain_dir}"
          mkdir -p "${toolchain_dir}"
          chmod 0700 "${toolchain_dir}"
          tar --extract --gzip --file "${archive_file}" --directory "${toolchain_dir}" --no-same-owner
          while IFS= read -r -d '' link; do
            resolved="$(realpath -e "${link}")"
            case "${resolved}" in
              "${toolchain_dir}"/node_modules/*) ;;
              *)
                echo "Marketplace toolchain symlink resolves outside node_modules" >&2
                exit 1
                ;;
            esac
          done < <(find "${toolchain_dir}" -type l -print0)

          test -x "${toolchain_dir}/node_modules/.bin/vsce"
          if [ "$(realpath -e "${toolchain_dir}/node_modules/.bin/vsce")" != "$(realpath -e "${toolchain_dir}/node_modules/@vscode/vsce/vsce")" ]; then
            echo "Extracted Marketplace VSCE launcher resolves outside the locked package" >&2
            exit 1
          fi
          jq -e '.packages["node_modules/@vscode/vsce"] | .version == "3.9.2" and (.integrity | startswith("sha512-"))' "${toolchain_dir}/package-lock.json" >/dev/null
          jq -e '.version == "3.9.2"' "${toolchain_dir}/node_modules/@vscode/vsce/package.json" >/dev/null
          node_bin="$(command -v node)"
          test -x "${node_bin}"

      - name: Publish VS Code extension to Marketplace
        if: ${{ needs.prepare-marketplace-toolchain.outputs.configured == 'true' }}
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
          VSCE_PAT: ${{ secrets.VSCE_PUBLISH }}
        run: |
          if [ -z "${VSCE_PAT:-}" ]; then
            echo "::error::VSCE publish token became unavailable after Marketplace publication was enabled." >&2
            exit 1
          fi

          vsce_bin="${RUNNER_TEMP}/vsce-toolchain/node_modules/.bin/vsce"
          vsix_path="${GITHUB_WORKSPACE}/publication-inputs/dist/lopper-vscode-${RELEASE_VERSION}.vsix"
          "${vsce_bin}" publish --packagePath "${vsix_path}"

  publish:
    needs:
      - prepare-release
      - prepare-release-publication
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release publication inputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: publication-inputs
          path: publication-inputs

      - name: Validate release publication inputs
        working-directory: publication-inputs
        env:
          PATH: /usr/bin:/bin
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          expected_assets=(
            "dist/lopper_${RELEASE_TAG}_linux_amd64.tar.gz"
            "dist/lopper_${RELEASE_TAG}_linux_arm64.tar.gz"
            "dist/lopper_${RELEASE_TAG}_windows_amd64.zip"
            "dist/lopper_${RELEASE_TAG}_windows_arm64.zip"
            "dist/lopper_${RELEASE_TAG}_darwin_amd64.tar.gz"
            "dist/lopper_${RELEASE_TAG}_darwin_arm64.tar.gz"
            "dist/lopper-vscode-${version}.vsix"
          )

          if find . -mindepth 1 ! -type f ! -type d -print -quit | grep -q .; then
            echo "Release publication inputs contain a non-regular entry" >&2
            exit 1
          fi
          if [ ! -f SHA256SUMS ] || [ -L SHA256SUMS ] || [ ! -s SHA256SUMS ]; then
            echo "Release publication checksum manifest is missing or invalid" >&2
            exit 1
          fi
          if [ "$(stat --format=%s SHA256SUMS)" -gt 65536 ]; then
            echo "Release publication checksum manifest exceeds the 64 KiB limit" >&2
            exit 1
          fi
          if find . -mindepth 1 -maxdepth 1 ! -name dist ! -name feature-flags.md ! -name SHA256SUMS -print -quit | grep -q .; then
            echo "Release publication inputs contain an unexpected top-level path" >&2
            exit 1
          fi
          if [ "$(find . -type f | wc -l | tr -d '[:space:]')" -ne 9 ]; then
            echo "Release publication inputs contain an unexpected file count" >&2
            exit 1
          fi
          if [ ! -f feature-flags.md ] || [ -L feature-flags.md ]; then
            echo "Feature flag release report must be a regular file" >&2
            exit 1
          fi
          if [ ! -s feature-flags.md ]; then
            echo "Feature flag release report must not be empty" >&2
            exit 1
          fi
          if [ "$(stat --format=%s feature-flags.md)" -gt 1048576 ]; then
            echo "Feature flag release report exceeds the 1 MiB publication limit" >&2
            exit 1
          fi
          if [ ! -d dist ] || [ -L dist ]; then
            echo "Release asset directory is missing or invalid" >&2
            exit 1
          fi
          if find -P dist -mindepth 1 -maxdepth 1 ! -type f -print -quit | grep -q .; then
            echo "Release asset directory must contain only regular files" >&2
            exit 1
          fi
          file_count="$(find -P dist -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d '[:space:]')"
          if [ "${file_count}" -ne "${#expected_assets[@]}" ]; then
            echo "Release publication inputs must contain exactly ${#expected_assets[@]} assets" >&2
            exit 1
          fi
          for asset in "${expected_assets[@]}"; do
            if [ ! -f "${asset}" ] || [ -L "${asset}" ]; then
              echo "Expected release asset ${asset} is missing or not a regular file" >&2
              exit 1
            fi
            if [ ! -s "${asset}" ]; then
              echo "Expected release asset ${asset} is empty" >&2
              exit 1
            fi
            if [ "$(stat --format=%s "${asset}")" -gt 1073741824 ]; then
              echo "Release asset ${asset} exceeds the 1 GiB publication limit" >&2
              exit 1
            fi
          done

          computed_checksums="$(mktemp)"
          trap 'rm -f "${computed_checksums}"' EXIT
          manifest_inputs=("feature-flags.md" "${expected_assets[@]}")
          mapfile -d '' sorted_manifest_inputs < <(printf '%s\0' "${manifest_inputs[@]}" | sort -z)
          sha256sum "${sorted_manifest_inputs[@]}" > "${computed_checksums}"
          if ! cmp -s SHA256SUMS "${computed_checksums}"; then
            echo "Release publication checksum manifest does not cover the exact input set" >&2
            exit 1
          fi
          sha256sum --check --strict SHA256SUMS

      - name: Update GitHub Release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          existing_body="$(mktemp)"
          release_notes="$(mktemp)"

          gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json body --jq '.body // ""' > "$existing_body"
          awk '
            /^<!-- lopper-feature-flags:start -->$/ { skip = 1; next }
            /^<!-- lopper-feature-flags:end -->$/ { skip = 0; next }
            /^<!-- lopper-release-assets:start -->$/ { skip = 1; next }
            /^<!-- lopper-release-assets:end -->$/ { skip = 0; next }
            skip != 1 { print }
          ' "$existing_body" > "$release_notes"

          ghcr_owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          ghcr_ref="ghcr.io/${ghcr_owner}/lopper:${tag}"
          ghcr_package_url="https://github.com/${GITHUB_REPOSITORY}/pkgs/container/lopper"

          {
            if [ -s publication-inputs/feature-flags.md ]; then
              cat publication-inputs/feature-flags.md
              echo
            fi
            echo "<!-- lopper-release-assets:start -->"
            echo "## Release assets"
            echo
            echo "- Tag: \`${tag}\`"
            echo "- GitHub Action: \`${GITHUB_REPOSITORY}@${tag}\`"
            echo "- Container image: \`${ghcr_ref}\`"
            echo "- GHCR package: [lopper](${ghcr_package_url})"
            echo "- VSIX asset: \`lopper-vscode-${tag#v}.vsix\`"
            echo "<!-- lopper-release-assets:end -->"
            echo
            cat "$release_notes"
          } > release-body.md

          gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --title "Release $tag" --notes-file release-body.md

      - name: Upload GitHub Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          assets=(
            "publication-inputs/dist/lopper_${tag}_linux_amd64.tar.gz"
            "publication-inputs/dist/lopper_${tag}_linux_arm64.tar.gz"
            "publication-inputs/dist/lopper_${tag}_windows_amd64.zip"
            "publication-inputs/dist/lopper_${tag}_windows_arm64.zip"
            "publication-inputs/dist/lopper_${tag}_darwin_amd64.tar.gz"
            "publication-inputs/dist/lopper_${tag}_darwin_arm64.tar.gz"
            "publication-inputs/dist/lopper-vscode-${tag#v}.vsix"
          )
          gh release upload "$tag" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber

  finalize-release:
    needs:
      - prepare-release
      - publish
      - publish-marketplace
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          encoded_tag="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$tag")"
          gh_err_file="$(mktemp)"
          set +e
          release_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${encoded_tag}" --jq '.id' 2>"$gh_err_file"
          )"
          gh_status=$?
          set -e
          if [ "$gh_status" -ne 0 ]; then
            if grep -q "HTTP 404" "$gh_err_file"; then
              release_id=""
            else
              cat "$gh_err_file" >&2
              rm -f "$gh_err_file"
              exit "$gh_status"
            fi
          fi
          rm -f "$gh_err_file"
          if [ -z "$release_id" ]; then
            release_id="$(
              gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/releases" \
                | jq -r --arg tag "$tag" '.[][] | select(.tag_name == $tag) | .id' \
                | head -n1
            )"
          fi
          if [ -z "$release_id" ]; then
            echo "Release ${tag} was not found" >&2
            exit 1
          fi
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -F draft=false \
            -f make_latest=true >/dev/null

      - name: Prepare GitHub Action floating tags
        id: prepare_tags
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare-release.outputs.sha }}
        run: |
          git_bin=/usr/bin/git
          env_bin=/usr/bin/env
          mktemp_bin=/usr/bin/mktemp
          rm_bin=/bin/rm
          if [ ! -x "${git_bin}" ] || [ ! -x "${env_bin}" ] || [ ! -x "${mktemp_bin}" ] || [ ! -x "${rm_bin}" ]; then
            echo "::error::Trusted binaries are unavailable for floating tag preparation." >&2
            exit 1
          fi
          git_home="$("${mktemp_bin}" -d)"
          trap '/bin/rm -rf "${git_home}"' EXIT
          repo_dir="${RUNNER_TEMP}/floating-tags"

          git_safe() {
            "${env_bin}" -i \
              HOME="${git_home}" \
              PATH=/usr/bin:/bin \
              GIT_TERMINAL_PROMPT=0 \
              GIT_CONFIG_NOSYSTEM=1 \
              GIT_CONFIG_GLOBAL=/dev/null \
              "${git_bin}" \
              -c core.hooksPath=/dev/null \
              -c credential.helper= \
              -c protocol.file.allow=never \
              -c protocol.ext.allow=never \
              "$@"
          }

          if [[ ! "${RELEASE_TAG}" =~ ^v([0-9]+)[.]([0-9]+)[.]([0-9]+)$ ]]; then
            echo "::notice::Skipping GitHub Action floating tags for non-stable semver release ${RELEASE_TAG}."
            echo "push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          major_tag="v${BASH_REMATCH[1]}"
          minor_tag="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"

          if [[ ! "${RELEASE_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Release source must be an immutable commit SHA." >&2
            exit 1
          fi

          expected_origin="https://github.com/${GITHUB_REPOSITORY}"
          "${rm_bin}" -rf "${repo_dir}"
          git_safe init "${repo_dir}"
          git_safe -C "${repo_dir}" remote add origin "${expected_origin}"
          origin_fetch_urls="$(git_safe -C "${repo_dir}" remote get-url --all origin)"
          origin_push_urls="$(git_safe -C "${repo_dir}" remote get-url --push --all origin)"
          if [ "${origin_fetch_urls}" != "${expected_origin}" ] || [ "${origin_push_urls}" != "${expected_origin}" ]; then
            echo "::error::Refusing to prepare floating tags through an unexpected origin." >&2
            exit 1
          fi

          git_safe -C "${repo_dir}" fetch --no-tags --depth=1 origin "${RELEASE_SHA}"
          git_safe -C "${repo_dir}" checkout --detach FETCH_HEAD
          resolved_sha="$(git_safe -C "${repo_dir}" rev-parse HEAD)"
          if [ "${resolved_sha}" != "${RELEASE_SHA}" ]; then
            echo "::error::Floating tag worktree resolved ${resolved_sha}, expected ${RELEASE_SHA}." >&2
            exit 1
          fi
          git_safe -C "${repo_dir}" tag --force "${major_tag}" "${RELEASE_SHA}"
          git_safe -C "${repo_dir}" tag --force "${minor_tag}" "${RELEASE_SHA}"
          echo "push=true" >> "$GITHUB_OUTPUT"

      - name: Push GitHub Action floating tags
        if: ${{ steps.prepare_tags.outputs.push == 'true' }}
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare-release.outputs.sha }}
          PUSH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git_bin=/usr/bin/git
          env_bin=/usr/bin/env
          base64_bin=/usr/bin/base64
          tr_bin=/usr/bin/tr
          mktemp_bin=/usr/bin/mktemp
          if [ ! -x "${git_bin}" ] || [ ! -x "${env_bin}" ] || [ ! -x "${base64_bin}" ] || [ ! -x "${tr_bin}" ] || [ ! -x "${mktemp_bin}" ]; then
            echo "::error::Trusted binaries are unavailable for the floating tag push step." >&2
            exit 1
          fi
          git_home="$("${mktemp_bin}" -d)"
          trap '/bin/rm -rf "${git_home}"' EXIT
          repo_dir="${RUNNER_TEMP}/floating-tags"

          git_safe() {
            "${env_bin}" -i \
              HOME="${git_home}" \
              PATH=/usr/bin:/bin \
              GIT_TERMINAL_PROMPT=0 \
              GIT_CONFIG_NOSYSTEM=1 \
              GIT_CONFIG_GLOBAL=/dev/null \
              "${git_bin}" \
              -c core.hooksPath=/dev/null \
              -c credential.helper= \
              -c protocol.file.allow=never \
              -c protocol.ext.allow=never \
              "$@"
          }

          git_network() {
            "${env_bin}" -i \
              HOME="${git_home}" \
              PATH=/usr/bin:/bin \
              GIT_TERMINAL_PROMPT=0 \
              GIT_CONFIG_NOSYSTEM=1 \
              GIT_CONFIG_GLOBAL=/dev/null \
              GIT_CONFIG_COUNT=5 \
              GIT_CONFIG_KEY_0=core.hooksPath \
              GIT_CONFIG_VALUE_0=/dev/null \
              GIT_CONFIG_KEY_1=credential.helper \
              GIT_CONFIG_VALUE_1= \
              GIT_CONFIG_KEY_2=protocol.file.allow \
              GIT_CONFIG_VALUE_2=never \
              GIT_CONFIG_KEY_3=protocol.ext.allow \
              GIT_CONFIG_VALUE_3=never \
              GIT_CONFIG_KEY_4=http.https://github.com/.extraheader \
              GIT_CONFIG_VALUE_4="AUTHORIZATION: basic ${auth_header}" \
              "${git_bin}" \
              "$@"
          }

          if [[ ! "${RELEASE_TAG}" =~ ^v([0-9]+)[.]([0-9]+)[.]([0-9]+)$ ]]; then
            echo "::error::Floating tag push received an invalid stable semver tag ${RELEASE_TAG}." >&2
            exit 1
          fi
          major_tag="v${BASH_REMATCH[1]}"
          minor_tag="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          if [[ ! "${RELEASE_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Release source must be an immutable commit SHA." >&2
            exit 1
          fi

          expected_origin="https://github.com/${GITHUB_REPOSITORY}"
          origin_fetch_urls="$(git_safe -C "${repo_dir}" remote get-url --all origin)"
          origin_push_urls="$(git_safe -C "${repo_dir}" remote get-url --push --all origin)"
          if [ "${origin_fetch_urls}" != "${expected_origin}" ] || [ "${origin_push_urls}" != "${expected_origin}" ]; then
            echo "::error::Refusing to update floating tags through an unexpected origin." >&2
            exit 1
          fi

          resolved_sha="$(git_safe -C "${repo_dir}" rev-parse HEAD)"
          major_target="$(git_safe -C "${repo_dir}" rev-parse "refs/tags/${major_tag}^{commit}")"
          minor_target="$(git_safe -C "${repo_dir}" rev-parse "refs/tags/${minor_tag}^{commit}")"
          if [ "${resolved_sha}" != "${RELEASE_SHA}" ] || [ "${major_target}" != "${RELEASE_SHA}" ] || [ "${minor_target}" != "${RELEASE_SHA}" ]; then
            echo "::error::Floating tag worktree or tag targets do not match ${RELEASE_SHA}." >&2
            exit 1
          fi

          push_token="${PUSH_TOKEN}"
          unset PUSH_TOKEN
          if [ -z "${push_token}" ]; then
            echo "::error::No token is available to update floating tags." >&2
            exit 1
          fi
          auth_header="$(printf 'x-access-token:%s' "${push_token}" | "${base64_bin}" | "${tr_bin}" -d '\n')"
          unset push_token
          git_network -C "${repo_dir}" push --force origin "refs/tags/${major_tag}" "refs/tags/${minor_tag}"

  homebrew-tap-token-gate:
    needs:
      - prepare-release
      - finalize-release
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      configured: ${{ steps.gate.outputs.configured }}
    steps:
      - name: Detect tap token
        id: gate
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

  validate-homebrew-tap:
    needs:
      - prepare-release
      - publish
      - homebrew-tap-token-gate
    if: ${{ needs.prepare-release.outputs.release_created == 'true' && needs.homebrew-tap-token-gate.outputs.configured == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORMULA_VERSION: ${{ needs.prepare-release.outputs.version }}
      SOURCE_SHA: ${{ needs.prepare-release.outputs.sha }}
      SOURCE_REPO: ${{ github.repository }}
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@fc695c54c2032716dd4cedd007489c8e32fc8a5d

      - name: Clone tap repository anonymously
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        run: |
          git_bin=/usr/bin/git
          mktemp_bin=/usr/bin/mktemp
          if [ ! -x "${git_bin}" ] || [ ! -x "${mktemp_bin}" ]; then
            echo "::error::Trusted binaries are not available for anonymous Homebrew tap validation" >&2
            exit 1
          fi
          export PATH=/usr/bin:/bin

          git_home="$("${mktemp_bin}" -d)"
          trap 'rm -rf "${git_home}"' EXIT

          env -i \
            HOME="${git_home}" \
            PATH="${PATH}" \
            GIT_TERMINAL_PROMPT=0 \
            GIT_CONFIG_NOSYSTEM=1 \
            "${git_bin}" \
            -c core.hooksPath=/dev/null \
            -c protocol.file.allow=never \
            -c protocol.ext.allow=never \
            clone --origin origin --branch main --single-branch \
            https://github.com/ben-ranford/homebrew-tap.git homebrew-tap

      - name: Regenerate lopper formula
        working-directory: homebrew-tap
        run: |
          set -euo pipefail

          source_url="https://github.com/${SOURCE_REPO}/archive/${SOURCE_SHA}.tar.gz"
          curl --fail --show-error --silent --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --connect-timeout 20 --max-time 180 \
            "$source_url" -o /tmp/lopper-source.tar.gz
          read -r source_sha _ < <(sha256sum /tmp/lopper-source.tar.gz)

          mkdir -p Formula
          cat > Formula/lopper.rb <<RUBY
          class Lopper < Formula
            desc "Local-first CLI/TUI for measuring dependency surface area"
            homepage "https://github.com/ben-ranford/lopper"
            url "${source_url}"
            version "${FORMULA_VERSION}"
            sha256 "${source_sha}"
            license "MIT"

            depends_on "go" => :build
            conflicts_with "ben-ranford/tap/lopper-rolling", because: "both install the lopper executable"

            def install
              ldflags = %W[
                -s
                -w
                -X github.com/ben-ranford/lopper/internal/version.version=#{version}
                -X github.com/ben-ranford/lopper/internal/version.buildChannel=release
              ]
              system "go", "build", *std_go_args(output: bin/"lopper", ldflags: ldflags.join(" ")), "./cmd/lopper"
              system "bash", "scripts/generate-manpage.sh", "docs/man/lopper.1"
              man1.install "docs/man/lopper.1"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/lopper --version")
            end
          end
          RUBY

      - name: Validate formula
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          brew untap ben-ranford/tap >/dev/null 2>&1 || true
          brew tap --custom-remote ben-ranford/tap "file://${PWD}"
          brew trust ben-ranford/tap
          brew audit --strict --online ben-ranford/tap/lopper
          export HOMEBREW_NO_SANDBOX_LINUX=1
          brew install --build-from-source ben-ranford/tap/lopper
          brew test ben-ranford/tap/lopper

  update-homebrew-tap:
    needs:
      - prepare-release
      - publish
      - validate-homebrew-tap
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    concurrency:
      group: homebrew-tap-main
      cancel-in-progress: false
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
      FORMULA_VERSION: ${{ needs.prepare-release.outputs.version }}
      SOURCE_SHA: ${{ needs.prepare-release.outputs.sha }}
      SOURCE_REPO: ${{ github.repository }}
    steps:
      - name: Regenerate and push formula changes
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        run: |
          git_bin=/usr/bin/git
          curl_bin=/usr/bin/curl
          sha256sum_bin=/usr/bin/sha256sum
          base64_bin=/usr/bin/base64
          tr_bin=/usr/bin/tr
          mktemp_bin=/usr/bin/mktemp
          if [ ! -x "${git_bin}" ] || [ ! -x "${curl_bin}" ] || [ ! -x "${sha256sum_bin}" ] || [ ! -x "${base64_bin}" ] || [ ! -x "${tr_bin}" ] || [ ! -x "${mktemp_bin}" ]; then
            echo "::error::Trusted binaries are not available for the isolated Homebrew tap update step" >&2
            exit 1
          fi
          export PATH=/usr/bin:/bin

          git_home="$("${mktemp_bin}" -d)"
          work_root="$("${mktemp_bin}" -d)"
          tap_repo="${work_root}/homebrew-tap"
          source_archive="${work_root}/lopper-source.tar.gz"
          trap 'rm -rf "${git_home}" "${work_root}"' EXIT

          git_safe() {
            env -i \
              HOME="${git_home}" \
              PATH="${PATH}" \
              GIT_TERMINAL_PROMPT=0 \
              GIT_CONFIG_NOSYSTEM=1 \
              "${git_bin}" \
              -c core.hooksPath=/dev/null \
              -c credential.helper= \
              -c protocol.file.allow=never \
              -c protocol.ext.allow=never \
              "$@"
          }

          git_network() {
            env -i \
              HOME="${git_home}" \
              PATH="${PATH}" \
              GIT_TERMINAL_PROMPT=0 \
              GIT_CONFIG_NOSYSTEM=1 \
              GIT_CONFIG_COUNT=5 \
              GIT_CONFIG_KEY_0=core.hooksPath \
              GIT_CONFIG_VALUE_0=/dev/null \
              GIT_CONFIG_KEY_1=credential.helper \
              GIT_CONFIG_VALUE_1= \
              GIT_CONFIG_KEY_2=protocol.file.allow \
              GIT_CONFIG_VALUE_2=never \
              GIT_CONFIG_KEY_3=protocol.ext.allow \
              GIT_CONFIG_VALUE_3=never \
              GIT_CONFIG_KEY_4=http.https://github.com/.extraheader \
              GIT_CONFIG_VALUE_4="AUTHORIZATION: basic ${auth_header}" \
              "${git_bin}" \
              "$@"
          }

          git_safe clone --origin origin --branch main --single-branch https://github.com/ben-ranford/homebrew-tap.git "${tap_repo}"

          source_url="https://github.com/${SOURCE_REPO}/archive/${SOURCE_SHA}.tar.gz"
          "${curl_bin}" --fail --show-error --silent --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --connect-timeout 20 --max-time 180 \
            "${source_url}" -o "${source_archive}"
          read -r source_sha _ < <("${sha256sum_bin}" "${source_archive}")

          mkdir -p "${tap_repo}/Formula"
          cat > "${tap_repo}/Formula/lopper.rb" <<RUBY
          class Lopper < Formula
            desc "Local-first CLI/TUI for measuring dependency surface area"
            homepage "https://github.com/ben-ranford/lopper"
            url "${source_url}"
            version "${FORMULA_VERSION}"
            sha256 "${source_sha}"
            license "MIT"

            depends_on "go" => :build
            conflicts_with "ben-ranford/tap/lopper-rolling", because: "both install the lopper executable"

            def install
              ldflags = %W[
                -s
                -w
                -X github.com/ben-ranford/lopper/internal/version.version=#{version}
                -X github.com/ben-ranford/lopper/internal/version.buildChannel=release
              ]
              system "go", "build", *std_go_args(output: bin/"lopper", ldflags: ldflags.join(" ")), "./cmd/lopper"
              system "bash", "scripts/generate-manpage.sh", "docs/man/lopper.1"
              man1.install "docs/man/lopper.1"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/lopper --version")
            end
          end
          RUBY

          git_safe -C "${tap_repo}" config user.name "github-actions[bot]"
          git_safe -C "${tap_repo}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git_safe -C "${tap_repo}" add Formula/lopper.rb
          if git_safe -C "${tap_repo}" diff --cached --quiet; then
            echo "No formula changes to commit"
            exit 0
          fi

          git_safe -C "${tap_repo}" commit --no-verify -m "lopper ${RELEASE_TAG}"

          auth_header="$(printf 'x-access-token:%s' "${HOMEBREW_TAP_TOKEN}" | "${base64_bin}" | "${tr_bin}" -d '\n')"
          unset HOMEBREW_TAP_TOKEN

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt} for Homebrew formula"
            if ! git_network -C "${tap_repo}" fetch origin main:refs/remotes/origin/main; then
              echo "git fetch failed on attempt ${attempt}" >&2
              /bin/sleep 2
              continue
            fi
            if ! git_safe -C "${tap_repo}" rebase origin/main; then
              echo "git rebase failed on attempt ${attempt}; aborting rebase and retrying" >&2
              git_safe -C "${tap_repo}" rebase --abort || true
              /bin/sleep 2
              continue
            fi
            if git_network -C "${tap_repo}" push origin HEAD:main; then
              exit 0
            fi
            /bin/sleep 2
          done

          echo "Failed to push Homebrew formula after retries" >&2
          exit 1

  prepare-feature-release-history:
    needs:
      - prepare-release
      - finalize-release
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.stamp_history.outputs.changed }}
    steps:
      - name: Checkout trusted main tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.trusted_main_sha }}

      - name: Checkout validated release data
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0
          path: release-source
          ref: ${{ needs.prepare-release.outputs.sha }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Validate release data against trusted main
        env:
          RELEASE_SHA: ${{ needs.prepare-release.outputs.sha }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Release source must be an immutable commit SHA." >&2
            exit 1
          fi
          release_commit="$(git -C release-source rev-parse HEAD)"
          if [ "${release_commit}" != "${RELEASE_SHA}" ]; then
            echo "::error::Release data checkout resolved ${release_commit}, expected ${RELEASE_SHA}." >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "${release_commit}" HEAD; then
            echo "::error::Release source ${release_commit} is not in trusted main history." >&2
            exit 1
          fi

      - name: Build trusted feature flag tool
        run: |
          set -euo pipefail
          go build -o "${RUNNER_TEMP}/featureflag" ./tools/featureflag

      - name: Stamp first stable release history
        id: stamp_history
        working-directory: release-source
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v([0-9]+)[.]([0-9]+)[.]([0-9]+)$ ]]; then
            echo "::notice::Skipping feature release history for non-stable semver release ${RELEASE_TAG}."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          "${RUNNER_TEMP}/featureflag" stamp-release --release "${RELEASE_TAG}"
          "${RUNNER_TEMP}/featureflag" validate

          if git diff --quiet -- internal/featureflags/features.json; then
            echo "No feature release history changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Validate and stage feature history patch
        if: ${{ steps.stamp_history.outputs.changed == 'true' }}
        working-directory: release-source
        run: |
          set -euo pipefail

          mapfile -t changed_files < <(git diff --name-only)
          if [ "${#changed_files[@]}" -ne 1 ] || [ "${changed_files[0]}" != "internal/featureflags/features.json" ]; then
            echo "::error::Feature history generation changed an unexpected file set." >&2
            printf '%s\n' "${changed_files[@]}" >&2
            exit 1
          fi
          if [ -n "$(git ls-files --others --exclude-standard)" ]; then
            echo "::error::Feature history generation created unexpected untracked files." >&2
            exit 1
          fi
          git diff --check -- internal/featureflags/features.json

          artifact_dir="${GITHUB_WORKSPACE}/.artifacts"
          patch_file="${artifact_dir}/feature-history.patch"
          mkdir -p "${artifact_dir}"
          git diff --binary --full-index -- internal/featureflags/features.json > "${patch_file}"
          if [ ! -s "${patch_file}" ] || [ -L "${patch_file}" ] || [ "$(stat --format=%s "${patch_file}")" -gt 1048576 ]; then
            echo "::error::Feature history patch is missing, invalid, or larger than 1 MiB." >&2
            exit 1
          fi
          git apply --check --reverse "${patch_file}"
          (
            cd "${artifact_dir}"
            sha256sum feature-history.patch > SHA256SUMS
          )

      - name: Upload feature history patch
        if: ${{ steps.stamp_history.outputs.changed == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: feature-history-patch
          path: |
            .artifacts/feature-history.patch
            .artifacts/SHA256SUMS
          if-no-files-found: error
          include-hidden-files: true
          overwrite: true

  prepare-feature-release-history-push:
    needs:
      - prepare-release
      - prepare-feature-release-history
    if: ${{ needs.prepare-release.outputs.release_created == 'true' && needs.prepare-feature-release-history.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_tag: ${{ needs.prepare-release.outputs.tag }}
      release_sha: ${{ needs.prepare-release.outputs.sha }}
    steps:
      - name: Download feature history patch
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: feature-history-patch
          path: ${{ runner.temp }}/feature-history-input

      - name: Prepare trusted feature history commit
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare-release.outputs.sha }}
        run: |
          git_bin=/usr/bin/git
          env_bin=/usr/bin/env
          mktemp_bin=/usr/bin/mktemp
          rm_bin=/bin/rm
          if [ ! -x "${git_bin}" ] || [ ! -x "${env_bin}" ] || [ ! -x "${mktemp_bin}" ] || [ ! -x "${rm_bin}" ]; then
            echo "::error::Trusted binaries are unavailable for feature history commit preparation." >&2
            exit 1
          fi
          git_home="$("${mktemp_bin}" -d)"
          trap '/bin/rm -rf "${git_home}"' EXIT
          repo_dir="${RUNNER_TEMP}/feature-history-push"
          input_dir="${RUNNER_TEMP}/feature-history-input"
          patch_file="${input_dir}/feature-history.patch"

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "::error::Feature history commit requires a stable semver release tag." >&2
            exit 1
          fi
          if [[ ! "${RELEASE_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Release source must be an immutable commit SHA." >&2
            exit 1
          fi
          if find "${input_dir}" -mindepth 1 -maxdepth 1 ! -type f -print -quit | grep -q .; then
            echo "::error::Feature history artifact contains a non-regular entry." >&2
            exit 1
          fi
          if [ "$(find "${input_dir}" -maxdepth 1 -type f | wc -l)" -ne 2 ]; then
            echo "::error::Feature history artifact must contain exactly the patch and checksum manifest." >&2
            exit 1
          fi
          if [ ! -s "${patch_file}" ] || [ ! -f "${input_dir}/SHA256SUMS" ] || [ "$(stat --format=%s "${patch_file}")" -gt 1048576 ]; then
            echo "::error::Feature history patch artifact is missing, empty, or larger than 1 MiB." >&2
            exit 1
          fi
          (
            cd "${input_dir}"
            sha256sum --check --strict SHA256SUMS
          )

          git_safe() {
            "${env_bin}" -i \
              HOME="${git_home}" \
              PATH=/usr/bin:/bin \
              GIT_TERMINAL_PROMPT=0 \
              GIT_CONFIG_NOSYSTEM=1 \
              GIT_CONFIG_GLOBAL=/dev/null \
              "${git_bin}" \
              -c core.hooksPath=/dev/null \
              -c credential.helper= \
              -c protocol.file.allow=never \
              -c protocol.ext.allow=never \
              "$@"
          }

          expected_origin="https://github.com/${GITHUB_REPOSITORY}"
          "${rm_bin}" -rf "${repo_dir}"
          git_safe init "${repo_dir}"
          git_safe -C "${repo_dir}" remote add origin "${expected_origin}"
          origin_fetch_urls="$(git_safe -C "${repo_dir}" remote get-url --all origin)"
          origin_push_urls="$(git_safe -C "${repo_dir}" remote get-url --push --all origin)"
          if [ "${origin_fetch_urls}" != "${expected_origin}" ] || [ "${origin_push_urls}" != "${expected_origin}" ]; then
            echo "::error::Refusing to prepare feature history through an unexpected origin." >&2
            exit 1
          fi

          git_safe -C "${repo_dir}" fetch --no-tags --depth=1 origin "${RELEASE_SHA}"
          git_safe -C "${repo_dir}" checkout -b feature-history FETCH_HEAD
          resolved_sha="$(git_safe -C "${repo_dir}" rev-parse HEAD)"
          if [ "${resolved_sha}" != "${RELEASE_SHA}" ]; then
            echo "::error::Feature history worktree resolved ${resolved_sha}, expected ${RELEASE_SHA}." >&2
            exit 1
          fi

          git_safe -C "${repo_dir}" apply --index --whitespace=error-all "${patch_file}"
          mapfile -t staged_files < <(git_safe -C "${repo_dir}" diff --cached --name-only)
          if [ "${#staged_files[@]}" -ne 1 ] || [ "${staged_files[0]}" != "internal/featureflags/features.json" ]; then
            echo "::error::Feature history patch staged an unexpected file set." >&2
            printf '%s\n' "${staged_files[@]}" >&2
            exit 1
          fi
          git_safe -C "${repo_dir}" diff --cached --check
          git_safe -C "${repo_dir}" config user.name "github-actions[bot]"
          git_safe -C "${repo_dir}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          expected_subject="chore(flags): stamp ${RELEASE_TAG} feature release history"
          git_safe -C "${repo_dir}" commit -m "${expected_subject}"

          commit_count="$(git_safe -C "${repo_dir}" rev-list --count "${RELEASE_SHA}..HEAD")"
          parent_sha="$(git_safe -C "${repo_dir}" rev-parse HEAD^)"
          commit_subject="$(git_safe -C "${repo_dir}" log -1 --format=%s)"
          mapfile -t committed_files < <(git_safe -C "${repo_dir}" diff-tree --no-commit-id --name-only -r HEAD)
          if [ "${commit_count}" -ne 1 ] || [ "${parent_sha}" != "${RELEASE_SHA}" ] || [ "${commit_subject}" != "${expected_subject}" ]; then
            echo "::error::Feature history preparation did not create exactly the expected commit." >&2
            exit 1
          fi
          if [ "${#committed_files[@]}" -ne 1 ] || [ "${committed_files[0]}" != "internal/featureflags/features.json" ]; then
            echo "::error::Feature history commit changed an unexpected file set." >&2
            printf '%s\n' "${committed_files[@]}" >&2
            exit 1
          fi
          if [ -n "$(git_safe -C "${repo_dir}" status --porcelain --untracked-files=all)" ]; then
            echo "::error::Feature history worktree is not clean after commit preparation." >&2
            exit 1
          fi

      - name: Archive prepared trusted feature history worktree
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        env:
          PATH: /usr/bin:/bin
        run: |
          archive_root="${RUNNER_TEMP}/prepared-feature-release-history"
          archive_file="${archive_root}/prepared-feature-release-history-worktree.tar.gz"
          checksum_file="${archive_root}/SHA256SUMS"
          repo_dir="${RUNNER_TEMP}/feature-history-push"

          if [ ! -d "${repo_dir}/.git" ] || [ -L "${repo_dir}" ] || [ -L "${repo_dir}/.git" ]; then
            echo "::error::Prepared feature history worktree is unavailable or unsafe for archival." >&2
            exit 1
          fi
          rm -rf "${archive_root}"
          mkdir -p "${archive_root}"
          tar --create --gzip --file "${archive_file}" --directory "${RUNNER_TEMP}" feature-history-push
          if [ ! -s "${archive_file}" ] || [ -L "${archive_file}" ] || [ "$(stat --format=%s "${archive_file}")" -gt 268435456 ]; then
            echo "::error::Prepared feature history worktree archive is missing, unsafe, or larger than 256 MiB." >&2
            exit 1
          fi
          (
            cd "${archive_root}"
            sha256sum "$(basename "${archive_file}")" > "${checksum_file}"
          )

      - name: Upload prepared trusted feature history worktree
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: prepared-feature-release-history-worktree
          path: ${{ runner.temp }}/prepared-feature-release-history
          if-no-files-found: error

  push-feature-release-history:
    needs:
      - prepare-feature-release-history-push
    if: ${{ needs.prepare-feature-release-history-push.result == 'success' }}
    runs-on: ubuntu-latest
    concurrency:
      group: feature-release-history-main
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Download prepared trusted feature history worktree
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: prepared-feature-release-history-worktree
          path: ${{ runner.temp }}/prepared-feature-release-history-input

      - name: Validate prepared trusted feature history worktree
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        env:
          PATH: /usr/bin:/bin
        run: |
          artifact_root="${RUNNER_TEMP}/prepared-feature-release-history-input"
          archive_file="${artifact_root}/prepared-feature-release-history-worktree.tar.gz"
          checksum_file="${artifact_root}/SHA256SUMS"
          worktree_parent="${RUNNER_TEMP}/prepared-feature-release-history"
          worktree_dir="${worktree_parent}/feature-history-push"

          if [ ! -f "${archive_file}" ] || [ -L "${archive_file}" ] || [ ! -f "${checksum_file}" ] || [ -L "${checksum_file}" ]; then
            echo "::error::Prepared feature history worktree artifact is incomplete or unsafe." >&2
            exit 1
          fi
          if find "${artifact_root}" -mindepth 1 -maxdepth 1 ! -type f -print -quit | grep -q .; then
            echo "::error::Prepared feature history worktree artifact contains an unexpected path." >&2
            exit 1
          fi
          if [ "$(find "${artifact_root}" -maxdepth 1 -type f | wc -l | tr -d '[:space:]')" -ne 2 ]; then
            echo "::error::Prepared feature history worktree artifact must contain exactly an archive and checksum manifest." >&2
            exit 1
          fi
          if [ "$(stat --format=%s "${archive_file}")" -gt 268435456 ]; then
            echo "::error::Prepared feature history worktree archive is larger than 256 MiB." >&2
            exit 1
          fi
          if grep -Ev '^[0-9a-f]{64}  prepared-feature-release-history-worktree[.]tar[.]gz$' "${checksum_file}" | grep -q .; then
            echo "::error::Prepared feature history worktree checksum manifest contains an unexpected path." >&2
            exit 1
          fi
          (
            cd "${artifact_root}"
            sha256sum --check --strict "${checksum_file}"
          )

          rm -rf "${worktree_parent}"
          mkdir -p "${worktree_parent}"
          python3 - "${archive_file}" <<'PY'
          import posixpath
          import sys
          import tarfile

          archive_path = sys.argv[1]
          allowed_root = "feature-history-push"

          with tarfile.open(archive_path, "r:gz") as archive:
              members = archive.getmembers()
              if not members or len(members) > 65536:
                  raise SystemExit("Prepared feature history worktree archive contains an unexpected number of members")

              total_size = 0
              seen_names = set()
              for member in members:
                  raw_name = member.name
                  components = raw_name.split("/")
                  if not raw_name or raw_name.startswith("/") or any(component in ("", ".", "..") for component in components):
                      raise SystemExit(f"Prepared feature history worktree archive contains an unsafe path: {raw_name}")
                  normalized = posixpath.normpath(raw_name)
                  if raw_name != normalized:
                      raise SystemExit(f"Prepared feature history worktree archive contains a non-canonical path: {raw_name}")
                  if normalized in seen_names:
                      raise SystemExit(f"Prepared feature history worktree archive contains a duplicate path: {raw_name}")
                  seen_names.add(normalized)
                  if normalized.split("/", 1)[0] != allowed_root:
                      raise SystemExit(f"Prepared feature history worktree archive contains an unexpected path: {raw_name}")
                  if member.issym() or member.islnk():
                      raise SystemExit(f"Prepared feature history worktree archive contains a link: {raw_name}")
                  if not (member.isdir() or member.isfile()):
                      raise SystemExit(f"Prepared feature history worktree archive contains an unexpected entry type: {raw_name}")
                  total_size += member.size
                  if total_size > 1073741824:
                      raise SystemExit("Prepared feature history worktree archive exceeds the 1 GiB expanded size limit")
          PY
          tar --extract --gzip --no-same-owner --no-same-permissions --file "${archive_file}" --directory "${worktree_parent}"
          if [ ! -d "${worktree_dir}/.git" ] || [ -L "${worktree_dir}" ] || [ -L "${worktree_dir}/.git" ]; then
            echo "::error::Prepared feature history worktree archive did not restore a safe git worktree." >&2
            exit 1
          fi

      - name: Push feature history commit
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        env:
          RELEASE_TAG: ${{ needs.prepare-feature-release-history-push.outputs.release_tag }}
          RELEASE_SHA: ${{ needs.prepare-feature-release-history-push.outputs.release_sha }}
          PUSH_TOKEN: ${{ secrets.MAIN_SYNC_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git_bin=/usr/bin/git
          env_bin=/usr/bin/env
          base64_bin=/usr/bin/base64
          tr_bin=/usr/bin/tr
          mktemp_bin=/usr/bin/mktemp
          if [ ! -x "${git_bin}" ] || [ ! -x "${env_bin}" ] || [ ! -x "${base64_bin}" ] || [ ! -x "${tr_bin}" ] || [ ! -x "${mktemp_bin}" ]; then
            echo "::error::Trusted binaries are unavailable for the feature history push step." >&2
            exit 1
          fi
          git_home="$("${mktemp_bin}" -d)"
          trap '/bin/rm -rf "${git_home}"' EXIT
          repo_dir="${RUNNER_TEMP}/prepared-feature-release-history/feature-history-push"

          git_safe() {
            "${env_bin}" -i \
              HOME="${git_home}" \
              PATH=/usr/bin:/bin \
              GIT_TERMINAL_PROMPT=0 \
              GIT_CONFIG_NOSYSTEM=1 \
              GIT_CONFIG_GLOBAL=/dev/null \
              "${git_bin}" \
              -c core.hooksPath=/dev/null \
              -c credential.helper= \
              -c protocol.file.allow=never \
              -c protocol.ext.allow=never \
              "$@"
          }

          git_network() {
            "${env_bin}" -i \
              HOME="${git_home}" \
              PATH=/usr/bin:/bin \
              GIT_TERMINAL_PROMPT=0 \
              GIT_CONFIG_NOSYSTEM=1 \
              GIT_CONFIG_GLOBAL=/dev/null \
              GIT_CONFIG_COUNT=5 \
              GIT_CONFIG_KEY_0=core.hooksPath \
              GIT_CONFIG_VALUE_0=/dev/null \
              GIT_CONFIG_KEY_1=credential.helper \
              GIT_CONFIG_VALUE_1= \
              GIT_CONFIG_KEY_2=protocol.file.allow \
              GIT_CONFIG_VALUE_2=never \
              GIT_CONFIG_KEY_3=protocol.ext.allow \
              GIT_CONFIG_VALUE_3=never \
              GIT_CONFIG_KEY_4=http.https://github.com/.extraheader \
              GIT_CONFIG_VALUE_4="AUTHORIZATION: basic ${auth_header}" \
              "${git_bin}" \
              "$@"
          }

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "::error::Feature history push requires a stable semver release tag." >&2
            exit 1
          fi
          if [[ ! "${RELEASE_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Release source must be an immutable commit SHA." >&2
            exit 1
          fi
          expected_subject="chore(flags): stamp ${RELEASE_TAG} feature release history"
          expected_origin="https://github.com/${GITHUB_REPOSITORY}"
          origin_fetch_urls="$(git_safe -C "${repo_dir}" remote get-url --all origin)"
          origin_push_urls="$(git_safe -C "${repo_dir}" remote get-url --push --all origin)"
          if [ "${origin_fetch_urls}" != "${expected_origin}" ] || [ "${origin_push_urls}" != "${expected_origin}" ]; then
            echo "::error::Refusing to push feature release history through an unexpected origin." >&2
            exit 1
          fi

          prepared_commit_count="$(git_safe -C "${repo_dir}" rev-list --count "${RELEASE_SHA}..HEAD")"
          prepared_parent="$(git_safe -C "${repo_dir}" rev-parse HEAD^)"
          prepared_subject="$(git_safe -C "${repo_dir}" log -1 --format=%s)"
          mapfile -t prepared_files < <(git_safe -C "${repo_dir}" diff-tree --no-commit-id --name-only -r HEAD)
          if [ "${prepared_commit_count}" -ne 1 ] || [ "${prepared_parent}" != "${RELEASE_SHA}" ] || [ "${prepared_subject}" != "${expected_subject}" ]; then
            echo "::error::Feature history push did not receive exactly the expected commit." >&2
            exit 1
          fi
          if [ "${#prepared_files[@]}" -ne 1 ] || [ "${prepared_files[0]}" != "internal/featureflags/features.json" ]; then
            echo "::error::Feature history push received an unexpected committed file set." >&2
            printf '%s\n' "${prepared_files[@]}" >&2
            exit 1
          fi
          if [ -n "$(git_safe -C "${repo_dir}" status --porcelain --untracked-files=all)" ]; then
            echo "::error::Feature history push worktree is not clean." >&2
            exit 1
          fi

          push_token="${PUSH_TOKEN}"
          unset PUSH_TOKEN
          if [ -z "${push_token}" ]; then
            echo "::error::No token is available to push feature release history." >&2
            exit 1
          fi
          auth_header="$(printf 'x-access-token:%s' "${push_token}" | "${base64_bin}" | "${tr_bin}" -d '\n')"
          unset push_token

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt} for feature release history"
            if ! git_network -C "${repo_dir}" fetch origin main:refs/remotes/origin/main; then
              echo "git fetch failed on attempt ${attempt}" >&2
              /bin/sleep 2
              continue
            fi
            if git_safe -C "${repo_dir}" diff --quiet origin/main HEAD -- internal/featureflags/features.json; then
              echo "No feature release history changes to push"
              exit 0
            fi
            if ! git_safe -C "${repo_dir}" rebase origin/main; then
              echo "git rebase failed on attempt ${attempt}; aborting rebase and retrying" >&2
              git_safe -C "${repo_dir}" rebase --abort || true
              /bin/sleep 2
              continue
            fi

            main_sha="$(git_safe -C "${repo_dir}" rev-parse origin/main)"
            ahead_count="$(git_safe -C "${repo_dir}" rev-list --count origin/main..HEAD)"
            if [ "${ahead_count}" -eq 0 ] && git_safe -C "${repo_dir}" diff --quiet origin/main HEAD; then
              echo "No feature release history changes to push"
              exit 0
            fi
            push_parent="$(git_safe -C "${repo_dir}" rev-parse HEAD^)"
            push_subject="$(git_safe -C "${repo_dir}" log -1 --format=%s)"
            mapfile -t pushed_files < <(git_safe -C "${repo_dir}" diff-tree --no-commit-id --name-only -r HEAD)
            if [ "${ahead_count}" -ne 1 ] || [ "${push_parent}" != "${main_sha}" ] || [ "${push_subject}" != "${expected_subject}" ]; then
              echo "::error::Rebased feature history is not exactly one expected commit ahead of main." >&2
              exit 1
            fi
            if [ "${#pushed_files[@]}" -ne 1 ] || [ "${pushed_files[0]}" != "internal/featureflags/features.json" ]; then
              echo "::error::Rebased feature history changed an unexpected file set." >&2
              printf '%s\n' "${pushed_files[@]}" >&2
              exit 1
            fi
            if [ -n "$(git_safe -C "${repo_dir}" status --porcelain --untracked-files=all)" ]; then
              echo "::error::Rebased feature history worktree is not clean." >&2
              exit 1
            fi
            if git_network -C "${repo_dir}" push origin HEAD:main; then
              exit 0
            fi
            /bin/sleep 2
          done

          echo "Failed to push feature release history after retries" >&2
          exit 1

  skip-release:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.release_created != 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.tag == '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: No release published
        run: |
          echo "Release Please did not create a release on this push; the release PR was created or updated instead."
