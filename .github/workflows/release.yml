name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag or version to publish, such as v1.6.0 or 1.6.0
        required: true
        type: string

concurrency:
  # Serialize release runs so newer commits queue behind in-flight releases.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      trusted_main_sha: ${{ steps.trusted_main.outputs.trusted_main_sha }}
      release_created: ${{ steps.release.outputs.release_created || steps.manual.outputs.release_created }}
      tag: ${{ steps.release.outputs.tag_name || steps.manual.outputs.tag }}
      version: ${{ steps.release.outputs.version || steps.manual.outputs.version }}
      sha: ${{ steps.release.outputs.sha || steps.manual.outputs.sha }}
    steps:
      - name: Resolve trusted main workflow revision
        id: trusted_main
        env:
          PATH: /usr/bin:/bin
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /usr/bin/bash --noprofile --norc -euo pipefail {0}
        run: |
          expected_workflow_ref="${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/heads/main"
          if [ "${WORKFLOW_REF}" != "${expected_workflow_ref}" ]; then
            echo "::error::Release workflow must run from ${expected_workflow_ref}." >&2
            exit 1
          fi
          if [[ ! "${WORKFLOW_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Release workflow revision must be a lowercase full commit SHA." >&2
            exit 1
          fi
          printf 'trusted_main_sha=%s\n' "${WORKFLOW_SHA}" >> "$GITHUB_OUTPUT"

      - name: Run release-please
        if: ${{ github.event_name != 'workflow_dispatch' }}
        id: release
        uses: googleapis/release-please-action@0dfd8538845b8e92600d271a895a5372865d4062
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.MAIN_SYNC_PAT || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout release metadata
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.MAIN_SYNC_PAT || secrets.GITHUB_TOKEN }}

      - name: Prepare manual release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: manual
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.MAIN_SYNC_PAT || secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          tag="$(printf '%s' "${INPUT_TAG}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          if [ -z "${tag}" ]; then
            echo "::error::tag input is required for manual release promotion."
            exit 1
          fi
          if [[ "${tag}" != v* ]]; then
            tag="v${tag}"
          fi
          if ! git check-ref-format --normalize "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::tag input must be a valid Git tag name." >&2
            exit 1
          fi

          encoded_tag="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$tag")"
          release_json="$(mktemp)"
          gh_err_file="$(mktemp)"
          set +e
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${encoded_tag}" >"${release_json}" 2>"${gh_err_file}"
          gh_status=$?
          set -e
          if [ "${gh_status}" -ne 0 ]; then
            if grep -q "HTTP 404" "${gh_err_file}"; then
              gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/releases" \
                | jq -c --arg tag "$tag" '.[].[] | select(.tag_name == $tag)' \
                | head -n1 >"${release_json}"
            else
              cat "${gh_err_file}" >&2
              rm -f "${gh_err_file}" "${release_json}"
              exit "${gh_status}"
            fi
          fi
          rm -f "${gh_err_file}"
          if ! [ -s "${release_json}" ]; then
            echo "::error::Manual release promotion can only retry an existing GitHub release for ${tag}." >&2
            rm -f "${release_json}"
            exit 1
          fi

          echo "Reusing existing GitHub release ${tag}."
          git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"
          resolved_sha="$(git rev-list -n 1 "refs/tags/${tag}")"
          release_target="$(jq -r '.target_commitish // empty' "${release_json}")"
          rm -f "${release_json}"

          release_target_kind=""
          if [[ "${release_target}" == refs/heads/* || "${release_target}" == refs/remotes/* ]]; then
            release_target_kind="branch"
          elif [[ "${release_target}" == refs/tags/* ]]; then
            release_target_kind="immutable"
          elif git show-ref --verify --quiet "refs/heads/${release_target}" || git show-ref --verify --quiet "refs/remotes/origin/${release_target}"; then
            release_target_kind="branch"
          elif git show-ref --verify --quiet "refs/tags/${release_target}" || [[ "${release_target}" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
            release_target_kind="immutable"
          elif [ -n "${release_target}" ] && git rev-parse -q --verify "${release_target}^{commit}" >/dev/null 2>&1; then
            release_target_kind="immutable"
          fi

          if [ "${release_target_kind}" = "branch" ]; then
            echo "GitHub release ${tag} target_commitish ${release_target} is branch-valued; using tag ${tag} as the immutable retry source."
          elif [ "${release_target_kind}" = "immutable" ]; then
            release_target_sha="$(git rev-parse "${release_target}^{commit}")"
            if [ "${release_target_sha}" != "${resolved_sha}" ]; then
              echo "::error::GitHub release ${tag} targets ${release_target_sha}, but tag ${tag} points to ${resolved_sha}." >&2
              exit 1
            fi
          fi

          {
            echo "release_created=true"
            echo "tag=${tag}"
            echo "version=${tag#v}"
            echo "sha=${resolved_sha}"
          } >> "$GITHUB_OUTPUT"

  orchestrate-release:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/release-orchestration.yml
    with:
      tag: ${{ needs.prepare-release.outputs.tag }}
      source_sha: ${{ needs.prepare-release.outputs.sha }}
      artifact_prefix: release
      build_channel: release
      image_tags: |
        ${{ needs.prepare-release.outputs.tag }}
        latest

  build-vscode-extension:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.prepare-release.outputs.sha }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: extensions/vscode-lopper/package-lock.json

      - name: Build local lopper binary
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          version="${RELEASE_TAG#v}"
          make build VERSION="$version" BUILD_CHANNEL=release

      - name: Install extension dependencies
        run: make vscode-extension-install

      - name: Run VS Code smoke tests
        run: xvfb-run -a make vscode-extension-test

      - name: Package VS Code extension
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${RELEASE_TAG#v}"
          make sync-version VERSION="$version"
          cd extensions/vscode-lopper
          npx @vscode/vsce package --out "../../dist/lopper-vscode-${version}.vsix"

      - name: Upload VS Code extension artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-vscode-extension
          path: dist/*.vsix

  prepare-marketplace-toolchain:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      configured: ${{ steps.gate.outputs.configured }}
    steps:
      - name: Detect Marketplace token
        id: gate
        env:
          VSCE_PUBLISH: ${{ secrets.VSCE_PUBLISH }}
          PATH: /usr/bin:/bin
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /usr/bin/bash --noprofile --norc -euo pipefail {0}
        run: |
          if [ -n "${VSCE_PUBLISH:-}" ]; then
            printf '%s\n' 'configured=true' >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' 'configured=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Marketplace toolchain prep when token is missing
        if: ${{ steps.gate.outputs.configured != 'true' }}
        run: echo "VSCE publish token not configured; skipping Marketplace toolchain preparation."

      - name: Checkout trusted main Marketplace manifests
        if: ${{ steps.gate.outputs.configured == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.prepare-release.outputs.trusted_main_sha }}
          persist-credentials: false

      - name: Setup Node for Marketplace tooling
        if: ${{ steps.gate.outputs.configured == 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Validate Marketplace tooling lockfile
        if: ${{ steps.gate.outputs.configured == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          lockfile="extensions/vscode-lopper/package-lock.json"
          vsce_version="$(jq -er '.packages["node_modules/@vscode/vsce"].version' "${lockfile}")"
          vsce_integrity="$(jq -er '.packages["node_modules/@vscode/vsce"].integrity' "${lockfile}")"
          if [ "${vsce_version}" != "3.9.2" ]; then
            echo "::error::Trusted Marketplace lockfile resolves @vscode/vsce ${vsce_version}, expected 3.9.2." >&2
            exit 1
          fi
          case "${vsce_integrity}" in
            sha512-?*) ;;
            *)
              echo "::error::Trusted Marketplace lockfile lacks SHA-512 integrity for @vscode/vsce." >&2
              exit 1
              ;;
          esac

      - name: Prepare integrity-bound Marketplace toolchain
        if: ${{ steps.gate.outputs.configured == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          source_dir="extensions/vscode-lopper"
          scratch_dir="${RUNNER_TEMP}/marketplace-toolchain"
          rm -rf -- "${scratch_dir}"
          mkdir -p -- "${scratch_dir}"
          cp -- "${source_dir}/package.json" "${source_dir}/package-lock.json" "${scratch_dir}/"
          cd "${scratch_dir}"
          npm ci --ignore-scripts --include=dev --audit=false --fund=false
          vsce_package_dir="${scratch_dir}/node_modules/@vscode/vsce"
          test -f "${vsce_package_dir}/vsce"
          test -x "${vsce_package_dir}/vsce"
          test -f "${vsce_package_dir}/out/main.js"

      - name: Archive Marketplace toolchain
        if: ${{ steps.gate.outputs.configured == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          scratch_dir="${RUNNER_TEMP}/marketplace-toolchain"
          archive_dir="${RUNNER_TEMP}/marketplace-toolchain-artifact"
          archive_file="${archive_dir}/vsce-toolchain.tar.gz"
          rm -rf -- "${archive_dir}"
          mkdir -p -- "${archive_dir}"
          tar --create --gzip --dereference --file "${archive_file}" --directory "${scratch_dir}" package.json package-lock.json node_modules
          cd "${archive_dir}"
          sha256sum vsce-toolchain.tar.gz > SHA256SUMS

      - name: Upload Marketplace toolchain
        if: ${{ steps.gate.outputs.configured == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: marketplace-toolchain
          path: |
            ${{ runner.temp }}/marketplace-toolchain-artifact/vsce-toolchain.tar.gz
            ${{ runner.temp }}/marketplace-toolchain-artifact/SHA256SUMS
          if-no-files-found: error
          retention-days: 1

  build-darwin-amd64:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: macos-26-intel
    permissions:
      contents: read
    steps:
      - name: Checkout release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.prepare-release.outputs.sha }}

      - name: Compute build metadata
        id: build_meta
        run: |
          echo "commit=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Assert Darwin amd64 host
        shell: bash
        run: |
          set -euo pipefail
          host_goarch="$(go env GOARCH)"
          if [ "${host_goarch}" != "amd64" ]; then
            echo "::error::Expected darwin/amd64 runner, got darwin/${host_goarch}."
            exit 1
          fi

      - name: Install shellcheck
        run: brew install shellcheck

      - name: Install Go tooling
        run: |
          make tools-install
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Darwin amd64 release artifact
        env:
          TAG: ${{ needs.prepare-release.outputs.tag }}
          COMMIT_SHA: ${{ steps.build_meta.outputs.commit }}
          BUILD_DATE: ${{ steps.build_meta.outputs.build_date }}
        run: |
          make release \
            VERSION="$TAG" \
            GIT_COMMIT="$COMMIT_SHA" \
            BUILD_DATE="$BUILD_DATE" \
            RELEASE_BUILD_CHANNEL=release \
            PLATFORMS="darwin/amd64"

      - name: Upload Darwin amd64 artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-darwin-amd64
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    needs:
      - prepare-release
      - orchestrate-release
      - build-vscode-extension
      - build-darwin-amd64
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.sha }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Verify Darwin artifacts are present
        run: |
          set -euo pipefail
          if ! find dist -maxdepth 1 -type f -name '*_darwin_amd64.tar.gz' | grep -q .; then
            echo "Expected darwin/amd64 artifact is missing from dist/" >&2
            exit 1
          fi
          if ! find dist -maxdepth 1 -type f -name '*_darwin_arm64.tar.gz' | grep -q .; then
            echo "Expected darwin/arm64 artifact is missing from dist/" >&2
            exit 1
          fi

      - name: Generate feature flag release report
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          git fetch --tags --force
          previous_tag=""
          while IFS= read -r candidate; do
            if [ "${candidate}" != "${RELEASE_TAG}" ]; then
              previous_tag="${candidate}"
              break
            fi
          done < <(git tag --list 'v[0-9]*' --sort=-v:refname)

          args=(report --channel release --release "${RELEASE_TAG}")
          if [ -n "${previous_tag}" ]; then
            previous_catalog=".artifacts/previous-features.json"
            if git cat-file -e "${previous_tag}:internal/featureflags/features.json" 2>/dev/null; then
              git show "${previous_tag}:internal/featureflags/features.json" > "${previous_catalog}"
            else
              printf '[]\n' > "${previous_catalog}"
            fi
            args+=(--previous-catalog "${previous_catalog}")
          fi
          go run ./tools/featureflag "${args[@]}" > feature-flags.md

      - name: Update GitHub Release notes
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.tag }}"
          existing_body="$(mktemp)"
          release_notes="$(mktemp)"

          gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json body --jq '.body // ""' > "$existing_body"
          awk '
            /^<!-- lopper-feature-flags:start -->$/ { skip = 1; next }
            /^<!-- lopper-feature-flags:end -->$/ { skip = 0; next }
            /^<!-- lopper-release-assets:start -->$/ { skip = 1; next }
            /^<!-- lopper-release-assets:end -->$/ { skip = 0; next }
            skip != 1 { print }
          ' "$existing_body" > "$release_notes"

          ghcr_owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          ghcr_ref="ghcr.io/${ghcr_owner}/lopper:${tag}"
          ghcr_package_url="https://github.com/${GITHUB_REPOSITORY}/pkgs/container/lopper"

          {
            if [ -s feature-flags.md ]; then
              cat feature-flags.md
              echo
            fi
            echo "<!-- lopper-release-assets:start -->"
            echo "## Release assets"
            echo
            echo "- Tag: \`${tag}\`"
            echo "- GitHub Action: \`${GITHUB_REPOSITORY}@${tag}\`"
            echo "- Container image: \`${ghcr_ref}\`"
            echo "- GHCR package: [lopper](${ghcr_package_url})"
            echo "- VSIX asset: \`lopper-vscode-${tag#v}.vsix\`"
            echo "<!-- lopper-release-assets:end -->"
            echo
            cat "$release_notes"
          } > release-body.md

          gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --title "Release $tag" --notes-file release-body.md

      - name: Upload GitHub Release assets
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.tag }}"
          mapfile -t assets < <(find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.vsix' \) | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found in dist" >&2
            exit 1
          fi
          gh release upload "$tag" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber

      - name: Publish GitHub Release
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.tag }}"
          encoded_tag="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$tag")"
          gh_err_file="$(mktemp)"
          set +e
          release_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${encoded_tag}" --jq '.id' 2>"$gh_err_file"
          )"
          gh_status=$?
          set -e
          if [ "$gh_status" -ne 0 ]; then
            if grep -q "HTTP 404" "$gh_err_file"; then
              release_id=""
            else
              cat "$gh_err_file" >&2
              rm -f "$gh_err_file"
              exit "$gh_status"
            fi
          fi
          rm -f "$gh_err_file"
          if [ -z "$release_id" ]; then
            release_id="$(
              gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/releases" \
                | jq -r --arg tag "$tag" '.[][] | select(.tag_name == $tag) | .id' \
                | head -n1
            )"
          fi
          if [ -z "$release_id" ]; then
            echo "Release ${tag} was not found" >&2
            exit 1
          fi
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -F draft=false \
            -f make_latest=true >/dev/null

      - name: Update GitHub Action floating tags
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare-release.outputs.sha }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v([0-9]+)[.]([0-9]+)[.]([0-9]+)$ ]]; then
            echo "::notice::Skipping GitHub Action floating tags for non-stable semver release ${RELEASE_TAG}."
            exit 0
          fi

          major_tag="v${BASH_REMATCH[1]}"
          minor_tag="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --force "${major_tag}" "${RELEASE_SHA}"
          git tag --force "${minor_tag}" "${RELEASE_SHA}"
          git push --force origin "refs/tags/${major_tag}" "refs/tags/${minor_tag}"

  publish-vscode-marketplace:
    needs:
      - prepare-release
      - publish
      - build-vscode-extension
      - prepare-marketplace-toolchain
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Skip Marketplace publish when token is missing
        if: ${{ needs.prepare-marketplace-toolchain.outputs.configured != 'true' }}
        run: echo "VSCE publish token not configured; skipping marketplace publish."

      - name: Download VS Code extension artifact
        if: ${{ needs.prepare-marketplace-toolchain.outputs.configured == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-vscode-extension
          path: ${{ runner.temp }}/vscode-marketplace

      - name: Download Marketplace toolchain
        if: ${{ needs.prepare-marketplace-toolchain.outputs.configured == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: marketplace-toolchain
          path: ${{ runner.temp }}/marketplace-toolchain-artifact

      - name: Setup Node for Marketplace publication
        if: ${{ needs.prepare-marketplace-toolchain.outputs.configured == 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Validate Marketplace publication inputs
        if: ${{ needs.prepare-marketplace-toolchain.outputs.configured == 'true' }}
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
          VSIX_DIR: ${{ runner.temp }}/vscode-marketplace
          TOOLCHAIN_ARTIFACT_DIR: ${{ runner.temp }}/marketplace-toolchain-artifact
          TOOLCHAIN_DIR: ${{ runner.temp }}/trusted-vsce
        run: |
          set -euo pipefail
          archive_file="${TOOLCHAIN_ARTIFACT_DIR}/vsce-toolchain.tar.gz"
          checksum_file="${TOOLCHAIN_ARTIFACT_DIR}/SHA256SUMS"
          test -f "${archive_file}"
          test -f "${checksum_file}"
          cd "${TOOLCHAIN_ARTIFACT_DIR}"
          sha256sum --check --strict SHA256SUMS

          python3 - "${archive_file}" <<'PY'
          import pathlib
          import sys
          import tarfile

          archive = pathlib.Path(sys.argv[1])
          allowed_roots = {"package.json", "package-lock.json", "node_modules"}
          with tarfile.open(archive, mode="r:gz") as bundle:
              for member in bundle:
                  path = pathlib.PurePosixPath(member.name)
                  if path.is_absolute() or ".." in path.parts:
                      raise SystemExit(f"unsafe Marketplace toolchain path: {member.name}")
                  if not path.parts or path.parts[0] not in allowed_roots:
                      raise SystemExit(f"unexpected Marketplace toolchain root: {member.name}")
                  if member.issym() or member.islnk():
                      raise SystemExit(f"Marketplace toolchain links are forbidden: {member.name}")
          PY

          rm -rf -- "${TOOLCHAIN_DIR}"
          mkdir -p -- "${TOOLCHAIN_DIR}"
          tar --extract --gzip --no-same-owner --file "${archive_file}" --directory "${TOOLCHAIN_DIR}"
          lockfile="${TOOLCHAIN_DIR}/package-lock.json"
          vsce_version="$(jq -er '.packages["node_modules/@vscode/vsce"].version' "${lockfile}")"
          vsce_integrity="$(jq -er '.packages["node_modules/@vscode/vsce"].integrity' "${lockfile}")"
          if [ "${vsce_version}" != "3.9.2" ]; then
            echo "::error::Prepared Marketplace toolchain resolves @vscode/vsce ${vsce_version}, expected 3.9.2." >&2
            exit 1
          fi
          case "${vsce_integrity}" in
            sha512-?*) ;;
            *)
              echo "::error::Prepared Marketplace toolchain lacks SHA-512 integrity for @vscode/vsce." >&2
              exit 1
              ;;
          esac
          vsce_package_dir="${TOOLCHAIN_DIR}/node_modules/@vscode/vsce"
          test -f "${vsce_package_dir}/vsce"
          test -x "${vsce_package_dir}/vsce"
          test -f "${vsce_package_dir}/out/main.js"

          expected_vsix="${VSIX_DIR}/lopper-vscode-${RELEASE_VERSION}.vsix"
          test -f "${expected_vsix}"
          if [ "$(find "${VSIX_DIR}" -mindepth 1 -maxdepth 1 -type f | wc -l)" -ne 1 ]; then
            echo "::error::Expected exactly one VS Code extension artifact." >&2
            exit 1
          fi

      - name: Publish VS Code extension to Marketplace
        if: ${{ needs.prepare-marketplace-toolchain.outputs.configured == 'true' }}
        shell: bash --noprofile --norc {0}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PUBLISH }}
          VSCE_BIN: ${{ runner.temp }}/trusted-vsce/node_modules/@vscode/vsce/vsce
          VSIX_PATH: ${{ runner.temp }}/vscode-marketplace/lopper-vscode-${{ needs.prepare-release.outputs.version }}.vsix
          BASH_ENV: ""
          ENV: ""
          CDPATH: ""
          NODE_OPTIONS: ""
          NODE_PATH: ""
        run: |
          set -euo pipefail
          "${VSCE_BIN}" publish --packagePath "${VSIX_PATH}"

  update-homebrew-tap:
    needs:
      - prepare-release
      - publish
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    concurrency:
      group: homebrew-tap-main
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Detect tap token
        id: tap_token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Homebrew
        if: ${{ steps.tap_token.outputs.available == 'true' }}
        uses: Homebrew/actions/setup-homebrew@fc695c54c2032716dd4cedd007489c8e32fc8a5d

      - name: Checkout tap repository
        if: ${{ steps.tap_token.outputs.available == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ben-ranford/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
          fetch-depth: 0

      - name: Update lopper formula
        if: ${{ steps.tap_token.outputs.available == 'true' }}
        working-directory: homebrew-tap
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          source_url="https://github.com/${SOURCE_REPO}/archive/refs/tags/${RELEASE_TAG}.tar.gz"
          curl --fail --show-error --silent --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --connect-timeout 20 --max-time 180 \
            "$source_url" -o /tmp/lopper-source.tar.gz
          source_sha="$(sha256sum /tmp/lopper-source.tar.gz | awk '{print $1}')"

          mkdir -p Formula
          cat > Formula/lopper.rb <<RUBY
          class Lopper < Formula
            desc "Local-first CLI/TUI for measuring dependency surface area"
            homepage "https://github.com/ben-ranford/lopper"
            url "${source_url}"
            sha256 "${source_sha}"
            license "MIT"

            depends_on "go" => :build
            conflicts_with "ben-ranford/tap/lopper-rolling", because: "both install the lopper executable"

            def install
              ldflags = %W[
                -s
                -w
                -X github.com/ben-ranford/lopper/internal/version.version=#{version}
                -X github.com/ben-ranford/lopper/internal/version.buildChannel=release
              ]
              system "go", "build", *std_go_args(output: bin/"lopper", ldflags: ldflags.join(" ")), "./cmd/lopper"
              system "bash", "scripts/generate-manpage.sh", "docs/man/lopper.1"
              man1.install "docs/man/lopper.1"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/lopper --version")
            end
          end
          RUBY

      - name: Validate formula
        if: ${{ steps.tap_token.outputs.available == 'true' }}
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          brew untap ben-ranford/tap >/dev/null 2>&1 || true
          brew tap --custom-remote ben-ranford/tap "file://${PWD}"
          brew trust ben-ranford/tap
          brew audit --strict --online ben-ranford/tap/lopper
          export HOMEBREW_NO_SANDBOX_LINUX=1
          brew install --build-from-source ben-ranford/tap/lopper
          brew test ben-ranford/tap/lopper

      - name: Commit and push formula changes
        if: ${{ steps.tap_token.outputs.available == 'true' }}
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/lopper.rb
          if git diff --cached --quiet; then
            echo "No formula changes to commit"
            exit 0
          fi

          git commit -m "lopper ${{ needs.prepare-release.outputs.tag }}"
          for attempt in 1 2 3; do
            echo "Push attempt ${attempt} for Homebrew formula"
            if ! git fetch origin main:refs/remotes/origin/main; then
              echo "git fetch failed on attempt ${attempt}" >&2
              sleep 2
              continue
            fi
            if ! git rebase origin/main; then
              echo "git rebase failed on attempt ${attempt}; aborting rebase and retrying" >&2
              git rebase --abort || true
              sleep 2
              continue
            fi
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep 2
          done

          echo "Failed to push Homebrew formula after retries" >&2
          exit 1

      - name: Skip tap update when token is missing
        if: ${{ steps.tap_token.outputs.available != 'true' }}
        run: echo "HOMEBREW_TAP_TOKEN not configured; skipping tap update."

  stamp-feature-release-history:
    needs:
      - prepare-release
      - publish
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    concurrency:
      group: feature-release-history-main
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.sha }}
          token: ${{ secrets.MAIN_SYNC_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Stamp first stable release history
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          go run ./tools/featureflag stamp-release --release "${RELEASE_TAG}"
          go run ./tools/featureflag validate

          git add internal/featureflags/features.json
          if git diff --cached --quiet; then
            echo "No feature release history changes to commit"
            exit 0
          fi

          git commit -m "chore(flags): stamp ${RELEASE_TAG} feature release history"
          for attempt in 1 2 3; do
            echo "Push attempt ${attempt} for feature release history"
            if ! git fetch origin main:refs/remotes/origin/main; then
              echo "git fetch failed on attempt ${attempt}" >&2
              sleep 2
              continue
            fi
            if ! git rebase origin/main; then
              echo "git rebase failed on attempt ${attempt}; aborting rebase and retrying" >&2
              git rebase --abort || true
              sleep 2
              continue
            fi
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep 2
          done

          echo "Failed to push feature release history after retries" >&2
          exit 1

  skip-release:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.release_created != 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.tag == '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: No release published
        run: |
          echo "Release Please did not create a release on this push; the release PR was created or updated instead."
