name: release

on:
  schedule:
    - cron: '0 12 * * 6'
  workflow_dispatch:

concurrency:
  # Serialize release runs so newer commits queue behind in-flight releases.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      previous_tag: ${{ steps.tag.outputs.previous_tag }}
      should_release: ${{ steps.tag.outputs.should_release }}
      release_reason: ${{ steps.tag.outputs.release_reason }}
      is_stable_release: ${{ steps.tag.outputs.is_stable_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute weekly semver tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          package_json_path="extensions/vscode-lopper/package.json"
          release_floor="$(python3 scripts/read_package_version.py "$package_json_path")"
          if [[ ! "$release_floor" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Extension version '$release_floor' is invalid"
            exit 1
          fi
          release_floor_tag="v${release_floor}"

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)"
          if [ -z "$latest_tag" ]; then
            next_tag="$release_floor_tag"
            previous_tag=""
          else
            if [[ "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="${BASH_REMATCH[3]}"
              bumped_tag="v${major}.${minor}.$((patch + 1))"
              if [ "$(printf '%s\n%s\n' "$release_floor" "${bumped_tag#v}" | sort -V | tail -n1)" = "$release_floor" ] && [ "$latest_tag" != "$release_floor_tag" ]; then
                next_tag="$release_floor_tag"
              else
                next_tag="$bumped_tag"
              fi
              previous_tag="$latest_tag"
            else
              echo "Latest semver tag '$latest_tag' is invalid"
              exit 1
            fi
          fi

          commits_since_previous_tag="0"
          if [ -n "${previous_tag}" ]; then
            commits_since_previous_tag="$(git rev-list --count "${previous_tag}..HEAD")"
          fi

          should_release="true"
          release_reason="changes_detected"
          is_stable_release="false"
          if [[ "$next_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            is_stable_release="true"
          fi
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            release_reason="manual_dispatch"
          elif [ -z "${previous_tag}" ]; then
            release_reason="initial_release"
          elif [ "${next_tag}" = "${release_floor_tag}" ] && [ "${previous_tag}" != "${release_floor_tag}" ]; then
            release_reason="version_alignment"
          elif [ "${commits_since_previous_tag}" = "0" ]; then
            should_release="false"
            release_reason="no_changes"
          fi

          {
            echo "tag=$next_tag"
            echo "previous_tag=$previous_tag"
            echo "should_release=$should_release"
            echo "release_reason=$release_reason"
            echo "is_stable_release=$is_stable_release"
          } >> "$GITHUB_OUTPUT"

      - name: Log release gate decision
        run: |
          echo "Release gate: should_release=${{ steps.tag.outputs.should_release }}"
          echo "Release gate reason: ${{ steps.tag.outputs.release_reason }}"
          echo "Stable semver release: ${{ steps.tag.outputs.is_stable_release }}"

  build-linux-windows:
    needs: prepare
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install Go tooling
        run: |
          make tools-install
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Validate project
        run: make ci

      - name: Build Linux/Windows release artifacts
        run: |
          make release \
            VERSION=${{ needs.prepare.outputs.tag }} \
            PLATFORMS="linux/amd64 linux/arm64 windows/amd64 windows/arm64"

      - name: Upload Linux/Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-linux-windows
          path: |
            dist/*.tar.gz
            dist/*.zip

  build-darwin:
    needs: prepare
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install shellcheck
        run: brew install shellcheck

      - name: Install Go tooling
        run: |
          make tools-install
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Validate project
        run: make ci

      - name: Build Darwin release artifact
        run: |
          host_goarch="$(go env GOARCH)"
          make release \
            VERSION=${{ needs.prepare.outputs.tag }} \
            PLATFORMS="darwin/${host_goarch}"

      - name: Upload Darwin artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-darwin
          path: |
            dist/*.tar.gz
            dist/*.zip

  build-ghcr:
    needs: prepare
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute image name
        id: image
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/lopper" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.image.outputs.name }}:${{ needs.prepare.outputs.tag }}
            ${{ steps.image.outputs.name }}:latest
          provenance: false
          sbom: true

  build-vscode-extension:
    needs: prepare
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: extensions/vscode-lopper/package-lock.json

      - name: Build local lopper binary
        run: make build

      - name: Install extension dependencies
        run: make vscode-extension-install

      - name: Run VS Code smoke tests
        run: xvfb-run -a make vscode-extension-test

      - name: Package VS Code extension
        if: ${{ needs.prepare.outputs.is_stable_release == 'true' }}
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${RELEASE_TAG#v}"
          current_version="$(python3 scripts/read_package_version.py extensions/vscode-lopper/package.json)"
          cd extensions/vscode-lopper
          if [ "$current_version" != "$version" ]; then
            npm version "$version" --no-git-tag-version
          fi
          npx @vscode/vsce package --out "../../dist/lopper-vscode-${version}.vsix"

      - name: Upload VS Code extension artifact
        if: ${{ needs.prepare.outputs.is_stable_release == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: release-vscode-extension
          path: dist/*.vsix

  publish:
    needs:
      - prepare
      - build-linux-windows
      - build-darwin
      - build-ghcr
      - build-vscode-extension
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VSCE_PUBLISH: ${{ secrets.VSCE_PUBLISH }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate changelog
        run: |
          set -euo pipefail
          current_tag="${{ needs.prepare.outputs.tag }}"
          ghcr_owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          ghcr_ref="ghcr.io/${ghcr_owner}/lopper:${current_tag}"
          ghcr_package_url="https://github.com/${GITHUB_REPOSITORY}/pkgs/container/lopper"

          {
            echo "## Weekly semver release"
            echo
            echo "- Tag: \`${current_tag}\`"
            echo
            echo "## Container image"
            echo
            echo "- Tagged image: \`${ghcr_ref}\`"
            echo "- Package: [GHCR lopper package](${ghcr_package_url})"
            echo
            echo "## VS Code extension"
            echo
            echo "- Marketplace ID: \`BenRanford.vscode-lopper\`"
            echo "- VSIX asset: \`lopper-vscode-${current_tag#v}.vsix\`"
            echo
            echo "---"
            echo
            echo "_GitHub auto-generated release notes follow._"
          } > release-changelog.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.tag }}
          body_path: release-changelog.md
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.vsix

      - name: Setup Node
        if: ${{ needs.prepare.outputs.is_stable_release == 'true' && env.VSCE_PUBLISH != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Publish VS Code extension to Marketplace
        if: ${{ needs.prepare.outputs.is_stable_release == 'true' && env.VSCE_PUBLISH != '' }}
        env:
          VSCE_PAT: ${{ env.VSCE_PUBLISH }}
        run: |
          set -euo pipefail
          vsix_path="$(find dist -maxdepth 1 -name 'lopper-vscode-*.vsix' | head -n1)"
          test -n "$vsix_path"
          npx --yes @vscode/vsce publish --packagePath "$vsix_path"

  update-homebrew-tap:
    needs:
      - prepare
      - publish
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Detect tap token
        id: tap_token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Homebrew
        if: ${{ steps.tap_token.outputs.available == 'true' }}
        uses: Homebrew/actions/setup-homebrew@364ad4f311f501cca105335ade096a0864322377

      - name: Checkout tap repository
        if: ${{ steps.tap_token.outputs.available == 'true' }}
        uses: actions/checkout@v6
        with:
          repository: ben-ranford/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update lopper formula
        if: ${{ steps.tap_token.outputs.available == 'true' }}
        working-directory: homebrew-tap
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          source_url="https://github.com/${SOURCE_REPO}/archive/refs/tags/${RELEASE_TAG}.tar.gz"
          curl --fail --show-error --silent --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --connect-timeout 20 --max-time 180 \
            "$source_url" -o /tmp/lopper-source.tar.gz
          source_sha="$(sha256sum /tmp/lopper-source.tar.gz | awk '{print $1}')"

          mkdir -p Formula
          cat > Formula/lopper.rb <<RUBY
          class Lopper < Formula
            desc "Local-first CLI/TUI for measuring dependency surface area"
            homepage "https://github.com/ben-ranford/lopper"
            url "${source_url}"
            sha256 "${source_sha}"
            license "MIT"

            depends_on "go" => :build
            conflicts_with "ben-ranford/tap/lopper-rolling", because: "both install the lopper executable"

            def install
              system "go", "build", *std_go_args(output: bin/"lopper"), "./cmd/lopper"
            end

            test do
              assert_match "Usage:", shell_output("#{bin}/lopper --help")
            end
          end
          RUBY

      - name: Validate formula
        if: ${{ steps.tap_token.outputs.available == 'true' }}
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          brew untap ben-ranford/tap >/dev/null 2>&1 || true
          brew tap --custom-remote ben-ranford/tap "file://${PWD}"
          brew audit --strict --online ben-ranford/tap/lopper
          brew install --build-from-source ben-ranford/tap/lopper
          brew test ben-ranford/tap/lopper

      - name: Commit and push formula changes
        if: ${{ steps.tap_token.outputs.available == 'true' }}
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/lopper.rb
          if git diff --cached --quiet; then
            echo "No formula changes to commit"
            exit 0
          fi

          git commit -m "lopper ${{ needs.prepare.outputs.tag }}"
          git push origin HEAD:main

      - name: Skip tap update when token is missing
        if: ${{ steps.tap_token.outputs.available != 'true' }}
        run: echo "HOMEBREW_TAP_TOKEN not configured; skipping tap update."

  skip-release:
    needs: prepare
    if: ${{ needs.prepare.outputs.should_release != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: No-op when no changes since last semver tag
        run: |
          echo "Skipping weekly release: no changes detected since previous semver tag."
