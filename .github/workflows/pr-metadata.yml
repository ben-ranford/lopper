name: pr metadata

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled

jobs:
  validate:
    name: pr-metadata
    if: github.event.pull_request.user.login != 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Write PR body
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs');
            const path = require('node:path');
            const bodyPath = path.join(process.env.RUNNER_TEMP, 'pr-body.md');
            fs.writeFileSync(bodyPath, context.payload.pull_request?.body || '', 'utf8');
            core.exportVariable('PR_BODY_FILE', bodyPath);

      - name: Read repository merge policy
        uses: actions/github-script@v9
        with:
          script: |
            const { data: repo } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const eventRepo = context.payload.repository || {};
            const firstDefined = (...values) => values.find((value) => value !== undefined && value !== null);
            core.exportVariable('REPO_ALLOW_MERGE_COMMIT', String(firstDefined(repo.allow_merge_commit, repo.allowMergeCommit, eventRepo.allow_merge_commit, eventRepo.allowMergeCommit, false)));
            core.exportVariable('REPO_ALLOW_REBASE_MERGE', String(firstDefined(repo.allow_rebase_merge, repo.allowRebaseMerge, eventRepo.allow_rebase_merge, eventRepo.allowRebaseMerge, false)));
            core.exportVariable('REPO_ALLOW_SQUASH_MERGE', String(firstDefined(repo.allow_squash_merge, repo.allowSquashMerge, eventRepo.allow_squash_merge, eventRepo.allowSquashMerge, true)));
            core.exportVariable('REPO_SQUASH_MERGE_COMMIT_TITLE', String(firstDefined(repo.squash_merge_commit_title, repo.squashMergeCommitTitle, eventRepo.squash_merge_commit_title, eventRepo.squashMergeCommitTitle, 'PR_TITLE')));

      - name: Validate PR title and template
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
          PR_REGRESSION_EXEMPT_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'regression-exempt') }}
          REPOSITORY_FULL_NAME: ${{ github.repository }}
        run: go run ./tools/prcheck --check-repo-policy --title "$PR_TITLE" --head-ref "$PR_HEAD_REF" --head-repo-full-name "$PR_HEAD_REPO_FULL_NAME" --repo-full-name "$REPOSITORY_FULL_NAME" --body-file "$PR_BODY_FILE" --regression-exempt-label "$PR_REGRESSION_EXEMPT_LABEL"
