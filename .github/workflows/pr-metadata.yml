name: pr metadata

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

jobs:
  validate:
    name: pr-metadata
    if: github.event.pull_request.user.login != 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Write PR body
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs');
            const path = require('node:path');
            const bodyPath = path.join(process.env.RUNNER_TEMP, 'pr-body.md');
            fs.writeFileSync(bodyPath, context.payload.pull_request?.body || '', 'utf8');
            core.exportVariable('PR_BODY_FILE', bodyPath);

      - name: Read repository merge policy
        uses: actions/github-script@v9
        with:
          script: |
            const { data: repo } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            core.exportVariable('REPO_ALLOW_MERGE_COMMIT', String(repo.allow_merge_commit ?? repo.allowMergeCommit));
            core.exportVariable('REPO_ALLOW_REBASE_MERGE', String(repo.allow_rebase_merge ?? repo.allowRebaseMerge));
            core.exportVariable('REPO_ALLOW_SQUASH_MERGE', String(repo.allow_squash_merge ?? repo.allowSquashMerge));
            core.exportVariable('REPO_SQUASH_MERGE_COMMIT_TITLE', String(repo.squash_merge_commit_title ?? repo.squashMergeCommitTitle ?? ''));

      - name: Validate PR title and template
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: go run ./tools/prcheck --check-repo-policy --title "$PR_TITLE" --head-ref "$PR_HEAD_REF" --body-file "$PR_BODY_FILE"
