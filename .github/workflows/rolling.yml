name: rolling

on:
  pull_request:
    types:
      - closed
    branches:
      - main

concurrency:
  group: release-rolling-main
  cancel-in-progress: false

jobs:
  prepare-rolling:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.rolling.outputs.tag }}
      source_sha: ${{ steps.rolling.outputs.source_sha }}
    steps:
      - name: Compute rolling tag
        id: rolling
        run: |
          source_sha="${{ github.event.pull_request.merge_commit_sha || github.sha }}"
          short_sha="${source_sha::7}"
          date_tag="$(date -u +'%Y%m%d%H%M%S')"
          tag="rolling-${date_tag}-${short_sha}"
          {
            echo "tag=${tag}"
            echo "source_sha=${source_sha}"
          } >> "$GITHUB_OUTPUT"

  orchestrate-rolling:
    needs:
      - prepare-rolling
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/release-orchestration.yml
    with:
      tag: ${{ needs.prepare-rolling.outputs.tag }}
      source_sha: ${{ needs.prepare-rolling.outputs.source_sha }}
      artifact_prefix: rolling
      build_channel: rolling
      image_tags: |
        ${{ needs.prepare-rolling.outputs.tag }}
        rolling

  build-darwin-amd64-rolling:
    needs:
      - prepare-rolling
    runs-on: macos-15-intel
    permissions:
      contents: read
    env:
      ROLLING_TAG: ${{ needs.prepare-rolling.outputs.tag }}
      SOURCE_SHA: ${{ needs.prepare-rolling.outputs.source_sha }}
    steps:
      - name: Checkout rolling source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Compute build metadata
        id: build_meta
        run: |
          echo "commit=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install shellcheck
        run: brew install shellcheck

      - name: Install Go tooling
        run: |
          make tools-install
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Darwin amd64 rolling artifact
        env:
          COMMIT_SHA: ${{ steps.build_meta.outputs.commit }}
          BUILD_DATE: ${{ steps.build_meta.outputs.build_date }}
        run: |
          make release \
            VERSION="$ROLLING_TAG" \
            GIT_COMMIT="$COMMIT_SHA" \
            BUILD_DATE="$BUILD_DATE" \
            RELEASE_BUILD_CHANNEL=rolling \
            PLATFORMS="darwin/amd64"

      - name: Upload Darwin amd64 rolling artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rolling-darwin-amd64
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish-rolling:
    needs:
      - prepare-rolling
      - orchestrate-rolling
      - build-darwin-amd64-rolling
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      tag: ${{ needs.prepare-rolling.outputs.tag }}
    env:
      ROLLING_TAG: ${{ needs.prepare-rolling.outputs.tag }}
      SOURCE_SHA: ${{ needs.prepare-rolling.outputs.source_sha }}
    steps:
      - name: Checkout (for changelog generation)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.SOURCE_SHA }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download rolling binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: rolling-*
          merge-multiple: true
          path: dist

      - name: Verify Darwin artifacts are present
        run: |
          set -euo pipefail
          if ! find dist -maxdepth 1 -type f -name '*_darwin_amd64.tar.gz' | grep -q .; then
            echo "Expected darwin/amd64 artifact is missing from dist/" >&2
            exit 1
          fi
          if ! find dist -maxdepth 1 -type f -name '*_darwin_arm64.tar.gz' | grep -q .; then
            echo "Expected darwin/arm64 artifact is missing from dist/" >&2
            exit 1
          fi

      - name: Build rolling source bundle
        run: |
          set -euo pipefail
          mkdir -p dist
          bundle="lopper_${ROLLING_TAG}_source"
          archive_path="dist/${bundle}.tar.gz"

          git archive --format=tar.gz --prefix="${bundle}/" -o "$archive_path" "$SOURCE_SHA"
          sha256sum "$archive_path" > "${archive_path}.sha256"

      - name: Generate rolling release notes
        run: |
          set -euo pipefail
          git fetch --tags --force
          previous_tag=""
          while IFS= read -r candidate; do
            if [ "${candidate}" != "${ROLLING_TAG}" ]; then
              previous_tag="${candidate}"
              break
            fi
          done < <(git tag --list 'rolling-*' --sort=-creatordate)

          args=(report --channel rolling --release "${ROLLING_TAG}")
          if [ -n "${previous_tag}" ]; then
            mkdir -p .artifacts
            previous_catalog=".artifacts/previous-features.json"
            if git cat-file -e "${previous_tag}:internal/featureflags/features.json" 2>/dev/null; then
              git show "${previous_tag}:internal/featureflags/features.json" > "${previous_catalog}"
            else
              printf '[]\n' > "${previous_catalog}"
            fi
            args+=(--previous-catalog "${previous_catalog}")
          fi
          go run ./tools/featureflag "${args[@]}" > feature-flags.md

          {
            echo "## Rolling build from main"
            echo
            echo "This is a rolling pre-release generated from the latest merged \`main\` commit."
            echo
            echo "- Tag: \`${ROLLING_TAG}\`"
            echo "- Stability: rolling (not a stable semver release)"
            echo "- Docker rolling tag: \`ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/lopper:rolling\`"
            echo "- Homebrew rolling formula: \`ben-ranford/tap/lopper-rolling\`"
            echo
            cat feature-flags.md
            echo
            if [ -n "${previous_tag}" ]; then
              echo "Changes since \`${previous_tag}\`:"
              echo
              git log --reverse --pretty=format:'- %h %s (%an)' "${previous_tag}..${SOURCE_SHA}"
            else
              echo "Commits in this rolling build:"
              echo
              git log --reverse --pretty=format:'- %h %s (%an)' "${SOURCE_SHA}"
            fi
          } > rolling-changelog.md

      - name: Publish rolling prerelease
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.ROLLING_TAG }}
          target_commitish: ${{ env.SOURCE_SHA }}
          name: Rolling ${{ env.ROLLING_TAG }}
          body_path: rolling-changelog.md
          prerelease: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256

  update-homebrew-tap-rolling:
    needs:
      - prepare-rolling
      - publish-rolling
    runs-on: ubuntu-latest
    concurrency:
      group: homebrew-tap-main
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Detect tap token
        id: tap_token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Homebrew
        if: ${{ steps.tap_token.outputs.available == 'true' }}
        uses: Homebrew/actions/setup-homebrew@fc695c54c2032716dd4cedd007489c8e32fc8a5d

      - name: Checkout tap repository
        if: ${{ steps.tap_token.outputs.available == 'true' }}
        uses: actions/checkout@v6
        with:
          repository: ben-ranford/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
          fetch-depth: 0

      - name: Update lopper-rolling formula
        if: ${{ steps.tap_token.outputs.available == 'true' }}
        working-directory: homebrew-tap
        env:
          ROLLING_TAG: ${{ needs.prepare-rolling.outputs.tag }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          source_url="https://github.com/${SOURCE_REPO}/archive/refs/tags/${ROLLING_TAG}.tar.gz"
          curl --fail --show-error --silent --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --connect-timeout 20 --max-time 180 \
            "$source_url" -o /tmp/lopper-rolling-source.tar.gz
          source_sha="$(sha256sum /tmp/lopper-rolling-source.tar.gz | awk '{print $1}')"

          mkdir -p Formula
          cat > Formula/lopper-rolling.rb <<RUBY
          class LopperRolling < Formula
            desc "Local-first CLI/TUI for measuring dependency surface area"
            homepage "https://github.com/ben-ranford/lopper"
            url "${source_url}"
            sha256 "${source_sha}"
            license "MIT"

            keg_only :versioned_formula
            depends_on "go" => :build
            conflicts_with "ben-ranford/tap/lopper", because: "both install the lopper executable"

            def install
              ldflags = %W[
                -s
                -w
                -X github.com/ben-ranford/lopper/internal/version.version=#{version}
                -X github.com/ben-ranford/lopper/internal/version.buildChannel=rolling
              ]
              system "go", "build", *std_go_args(output: bin/"lopper", ldflags: ldflags.join(" ")), "./cmd/lopper"
              system "bash", "scripts/generate-manpage.sh", "docs/man/lopper.1"
              man1.install "docs/man/lopper.1"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/lopper --version")
            end
          end
          RUBY

      - name: Validate rolling formula
        if: ${{ steps.tap_token.outputs.available == 'true' }}
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          brew untap ben-ranford/tap >/dev/null 2>&1 || true
          brew tap --custom-remote ben-ranford/tap "file://${PWD}"
          brew audit --strict --online ben-ranford/tap/lopper-rolling
          brew install --build-from-source ben-ranford/tap/lopper-rolling
          brew test ben-ranford/tap/lopper-rolling

      - name: Commit and push rolling formula changes
        if: ${{ steps.tap_token.outputs.available == 'true' }}
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/lopper-rolling.rb
          if git diff --cached --quiet; then
            echo "No rolling formula changes to commit"
            exit 0
          fi

          git commit -m "lopper-rolling ${{ needs.prepare-rolling.outputs.tag }}"
          for attempt in 1 2 3; do
            echo "Push attempt ${attempt} for rolling Homebrew formula"
            if ! git fetch origin main:refs/remotes/origin/main; then
              echo "git fetch failed on attempt ${attempt}" >&2
              sleep 2
              continue
            fi
            if ! git rebase origin/main; then
              echo "git rebase failed on attempt ${attempt}; aborting rebase and retrying" >&2
              git rebase --abort || true
              sleep 2
              continue
            fi
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep 2
          done

          echo "Failed to push rolling Homebrew formula after retries" >&2
          exit 1

      - name: Skip rolling tap update when token is missing
        if: ${{ steps.tap_token.outputs.available != 'true' }}
        run: echo "HOMEBREW_TAP_TOKEN not configured; skipping rolling tap update."
