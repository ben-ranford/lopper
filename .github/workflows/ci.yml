name: ci

on:
  pull_request:

jobs:
  extension-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      vscode_extension: ${{ steps.filter.outputs.vscode_extension }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect VS Code extension changes
        id: filter
        uses: dorny/paths-filter@61f87a10cd2c304679af17bb73ef192addf33c1c
        with:
          filters: |
            vscode_extension:
              - 'extensions/vscode-lopper/**'

  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pr_report_artifact_id: ${{ steps.upload_pr_report_inputs.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        if: ${{ !env.ACT }}
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: go.mod

      - name: Setup Go (act)
        if: ${{ env.ACT }}
        run: |
          if ! command -v go >/dev/null 2>&1; then
            apt-get update
            apt-get install -y golang-go
          fi
          if ! command -v shellcheck >/dev/null 2>&1; then
            apt-get update
            apt-get install -y shellcheck
          fi
          go version

      - name: Install shellcheck
        if: ${{ !env.ACT }}
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Resolve gosec version
        id: gosec_version
        run: echo "value=$(make --silent print-gosec-version)" >> "$GITHUB_OUTPUT"

      - name: Install Go tooling
        env:
          GOSEC_VERSION: ${{ steps.gosec_version.outputs.value }}
        run: |
          make tools-install
          if [ -z "${ACT:-}" ]; then
            echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          fi

      - name: Resolve PR base ref
        if: ${{ github.event_name == 'pull_request' }}
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          base_ref="${PR_BASE_REF:-main}"
          printf 'BASE_REF=%s\n' "${base_ref}" >> "$GITHUB_ENV"

      - name: Fetch PR base
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          base_ref="${BASE_REF:-main}"
          git fetch --no-tags --depth=1 origin "${base_ref}"

      - name: Run CI target
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${GH_EVENT_NAME}" = "pull_request" ]; then
            base_ref="${BASE_REF:-main}"
            export MEMORY_BENCH_BASE="origin/${base_ref}"
            export MEMORY_BENCH_ENFORCE=0
          fi
          if [ -n "${ACT:-}" ]; then
            PATH="$(go env GOPATH)/bin:$PATH" make ci
          else
            make ci
          fi

      - name: Prove regression tests for fix PRs
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login != 'renovate[bot]' }}
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_REGRESSION_EXEMPT_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'regression-exempt') }}
        run: |
          go run ./tools/regressionproof --repo . --body-file "$PR_BODY_FILE" --title "$PR_TITLE" --base-sha "$PR_BASE_SHA" --regression-exempt-label "$PR_REGRESSION_EXEMPT_LABEL"

      - name: Fail on unapproved memory regression
        if: ${{ github.event_name == 'pull_request' && !env.ACT && always() && !contains(github.event.pull_request.labels.*.name, 'memory-approved') }}
        run: |
          if [ ! -f .artifacts/memory-bench-status.txt ]; then
            exit 0
          fi
          status="$(tr -d '[:space:]' < .artifacts/memory-bench-status.txt)"
          if [ "$status" = "1" ]; then
            echo "Memory benchmark regression detected. Add the memory-approved label to acknowledge and merge it."
            exit 1
          fi

      - name: Verify demo assets are up to date
        run: make demos-check

      - name: Run lopper self-analysis (base branch)
        id: lopper_base
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        run: |
          base_ref="${BASE_REF:-main}"
          mkdir -p .artifacts
          git worktree add --detach .artifacts/base "origin/${base_ref}"
          bin/lopper analyse --top 10 --repo .artifacts/base --language all --format json > .artifacts/lopper-base.json
          git worktree remove --force .artifacts/base

      - name: Run lopper delta summary (PR)
        id: lopper_delta
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        run: |
          mkdir -p .artifacts
          bin/lopper analyse --top 10 --repo . --language all --baseline .artifacts/lopper-base.json --format pr-comment > .artifacts/lopper-pr-comment.md

      - name: Run coverage gate
        id: cov
        continue-on-error: true
        env:
          COVERAGE_MIN: 98
          COVERAGE_PACKAGE_MIN: 98
        run: |
          set +e
          if [ -n "${ACT:-}" ]; then
            PATH="$(go env GOPATH)/bin:$PATH" make cov COVERAGE_MIN="${COVERAGE_MIN}" COVERAGE_PACKAGE_MIN="${COVERAGE_PACKAGE_MIN}"
          else
            make cov COVERAGE_MIN="${COVERAGE_MIN}" COVERAGE_PACKAGE_MIN="${COVERAGE_PACKAGE_MIN}"
          fi
          status=$?
          mkdir -p .artifacts
          printf '%s\n' "$status" > .artifacts/coverage-status.txt
          if [ -f .artifacts/coverage-total.txt ]; then
            total="$(cat .artifacts/coverage-total.txt)"
          else
            total=""
          fi
          echo "package_failures<<EOF" >> "$GITHUB_OUTPUT"
          if [ -f .artifacts/coverage-package-failures.txt ]; then
            cat .artifacts/coverage-package-failures.txt >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "total=$total" >> "$GITHUB_OUTPUT"
          exit $status

      - name: Stage PR report inputs
        if: ${{ github.event_name == 'pull_request' && always() }}
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        env:
          PATH: /usr/bin:/bin
          LOPPER_BASE_OUTCOME: ${{ steps.lopper_base.outcome }}
          LOPPER_DELTA_OUTCOME: ${{ steps.lopper_delta.outcome }}
        run: |
          write_bounded_output() {
            local dest="$1"
            local limit_bytes="$2"
            local value="$3"
            printf '%s\n' "${value}" > "${dest}"
            if [ "$(stat --format=%s "${dest}")" -gt "${limit_bytes}" ]; then
              echo "PR report input exceeds the ${limit_bytes}-byte staging limit: $(basename "${dest}")" >&2
              exit 1
            fi
          }

          copy_bounded_report() {
            local src="$1"
            local dest="$2"
            local limit_bytes="$3"
            if [ "$(stat --format=%s "${src}")" -gt "${limit_bytes}" ]; then
              echo "PR report input exceeds the ${limit_bytes}-byte staging limit: $(basename "${src}")" >&2
              exit 1
            fi
            cp -- "${src}" "${dest}"
          }

          report_root="${RUNNER_TEMP}/pr-report-inputs"
          rm -rf -- "${report_root}"
          mkdir -p -- "${report_root}"

          write_bounded_output "${report_root}/lopper-base-outcome.txt" 64 "${LOPPER_BASE_OUTCOME}"
          write_bounded_output "${report_root}/lopper-delta-outcome.txt" 64 "${LOPPER_DELTA_OUTCOME}"

          for report in \
            coverage-package-failures.txt \
            coverage-status.txt \
            coverage-total.txt \
            lopper-pr-comment.md \
            memory-bench-status.txt \
            memory-bench-summary.md
          do
            src=".artifacts/${report}"
            if [ -f "${src}" ] && [ ! -L "${src}" ]; then
              limit_bytes=1048576
              case "${report}" in
                coverage-package-failures.txt)
                  limit_bytes=131072
                  ;;
                coverage-status.txt|coverage-total.txt|memory-bench-status.txt)
                  limit_bytes=64
                  ;;
              esac
              copy_bounded_report "${src}" "${report_root}/${report}" "${limit_bytes}"
            fi
          done

      - name: Upload PR report inputs
        id: upload_pr_report_inputs
        if: ${{ github.event_name == 'pull_request' && always() && !env.ACT }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pr-report-inputs
          path: ${{ runner.temp }}/pr-report-inputs
          if-no-files-found: error

      - name: Upload binary artifact
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: lopper-bin
          path: bin/lopper
          if-no-files-found: ignore

      - name: Mock artifact upload (act)
        if: ${{ always() && env.ACT }}
        run: |
          test -f bin/lopper
          ls -lh bin/lopper

      - name: Fail workflow on coverage gate
        if: ${{ steps.cov.outcome == 'failure' }}
        run: exit 1

  publish-pr-reports:
    needs: verify
    if: ${{ always() && github.event_name == 'pull_request' && needs.verify.outputs.pr_report_artifact_id != '' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Download PR report inputs
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          artifact-ids: ${{ needs.verify.outputs.pr_report_artifact_id }}
          github-token: ${{ github.token }}
          path: pr-report-inputs
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}

      - name: Validate PR report inputs
        if: ${{ !env.ACT }}
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        env:
          PATH: /usr/bin:/bin
          REPORT_ROOT: pr-report-inputs
        run: |
          if [ ! -d "${REPORT_ROOT}" ]; then
            echo "PR report inputs are missing." >&2
            exit 1
          fi
          if find -P "${REPORT_ROOT}" -mindepth 1 -maxdepth 1 ! -type f -print -quit | grep -q .; then
            echo "PR report inputs must contain only regular files." >&2
            exit 1
          fi

          allowed_files=(
            coverage-package-failures.txt
            coverage-status.txt
            coverage-total.txt
            lopper-base-outcome.txt
            lopper-delta-outcome.txt
            lopper-pr-comment.md
            memory-bench-status.txt
            memory-bench-summary.md
          )
          required_files=(
            lopper-base-outcome.txt
            lopper-delta-outcome.txt
          )

          for required in "${required_files[@]}"; do
            path="${REPORT_ROOT}/${required}"
            if [ ! -f "${path}" ] || [ -L "${path}" ]; then
              echo "Missing required PR report input: ${required}" >&2
              exit 1
            fi
          done

          while IFS= read -r -d '' path; do
            name="$(basename "${path}")"
            case " ${allowed_files[*]} " in
              *" ${name} "*) ;;
              *)
                echo "Unexpected PR report input: ${name}" >&2
                exit 1
                ;;
            esac
            if [ "$(stat --format=%s "${path}")" -gt 1048576 ]; then
              echo "PR report input exceeds the 1 MiB publication limit: ${name}" >&2
              exit 1
            fi
          done < <(find -P "${REPORT_ROOT}" -mindepth 1 -maxdepth 1 -type f -print0)

      - name: Comment memory benchmark report on PR
        if: ${{ !env.ACT }}
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const fs = require('node:fs');

            const marker = '<!-- lopper-memory-bench -->';
            const reportRoot = 'pr-report-inputs';
            const summaryPath = `${reportRoot}/memory-bench-summary.md`;
            const statusPath = `${reportRoot}/memory-bench-status.txt`;
            const labels = context.payload.pull_request?.labels || [];
            const approved = labels.some((label) => label?.name === 'memory-approved');
            const status = fs.existsSync(statusPath) ? fs.readFileSync(statusPath, 'utf8').trim() : '';
            const summary = fs.existsSync(summaryPath)
              ? fs.readFileSync(summaryPath, 'utf8').trim()
              : '## Memory Benchmarks\n\n❌ Memory benchmark summary was not produced.';

            const footer =
              status === '1'
                ? approved
                  ? 'Approval: `memory-approved` label present. The regression is acknowledged for this PR.'
                  : 'Approval required: add the `memory-approved` label to merge an intentional memory regression.'
                : status === '0'
                  ? 'Approval: not required.'
                  : 'Approval: unavailable because the memory benchmark gate did not complete cleanly.';

            const body = [marker, summary, '', footer].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Comment lopper report on PR
        if: ${{ !env.ACT }}
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const fs = require('node:fs');

            const marker = '<!-- lopper-pr-report -->';
            const reportRoot = 'pr-report-inputs';
            const deltaCommentPath = `${reportRoot}/lopper-pr-comment.md`;
            const baseOutcomePath = `${reportRoot}/lopper-base-outcome.txt`;
            const deltaOutcomePath = `${reportRoot}/lopper-delta-outcome.txt`;
            const baseOutcome = fs.existsSync(baseOutcomePath) ? fs.readFileSync(baseOutcomePath, 'utf8').trim() : '';
            const deltaOutcome = fs.existsSync(deltaOutcomePath) ? fs.readFileSync(deltaOutcomePath, 'utf8').trim() : '';

            const failureBody = [
              marker,
              '## Lopper (Delta)',
              '',
              '❌ Lopper delta analysis failed in CI.',
              '',
              'Re-run the workflow, or run local head/base analyses and compare outputs.',
            ].join('\n');

            const body =
              baseOutcome !== 'success' ||
              deltaOutcome !== 'success' ||
              !fs.existsSync(deltaCommentPath)
                ? failureBody
                : `${marker}\n${fs.readFileSync(deltaCommentPath, 'utf8').trim()}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.filter(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker),
            );

            if (existing.length > 0) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing[0].id,
                body,
              });
              for (const duplicate of existing.slice(1)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: duplicate.id,
                });
              }
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Post SonarQube review comments (PR)
        if: ${{ !env.ACT && env.SONAR_TOKEN != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ben-ranford_lopper
          SONAR_HOST_URL: https://sonarcloud.io
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const marker = '<!-- lopper-sonar-review -->';
            const token = process.env.SONAR_TOKEN || '';
            const projectKey = process.env.SONAR_PROJECT_KEY || '';
            const host = (process.env.SONAR_HOST_URL || 'https://sonarcloud.io').replace(/\/+$/, '');
            const prNumber = context.payload.pull_request?.number;

            if (!prNumber) {
              core.info('No pull request context available, skipping Sonar comment.');
              return;
            }

            if (!token || !projectKey) {
              core.info('SONAR_TOKEN or project key is missing, skipping Sonar comment.');
              return;
            }

            const params = new URLSearchParams({
              componentKeys: projectKey,
              pullRequest: String(prNumber),
              resolved: 'false',
              p: '1',
              ps: '20',
            });
            const auth = `Basic ${Buffer.from(`${token}:`).toString('base64')}`;
            const jsonHeaders = {
              Authorization: auth,
              Accept: 'application/json',
            };
            const fetchJSON = async (path, searchParams) => {
              const endpoint = `${host}${path}?${searchParams.toString()}`;
              const response = await fetch(endpoint, { headers: jsonHeaders });
              if (!response.ok) {
                throw new Error(`Sonar API request failed (${response.status}): ${await response.text()}`);
              }
              return response.json();
            };

            const payload = await fetchJSON('/api/issues/search', params);
            const issues = Array.isArray(payload.issues) ? payload.issues : [];
            const total = Number.isFinite(payload.total) ? payload.total : issues.length;
            const extractPath = (component) => {
              const raw = String(component || '');
              return raw.includes(':') ? raw.slice(raw.indexOf(':') + 1) : raw;
            };
            const isMockOrFixtureIssue = (issue) => {
              const path = extractPath(issue.component);
              return /(^|\/)(mock|mocks|testdata)(\/|$)/.test(path) || /(^|\/)[^/]+_mock\.go$/.test(path);
            };
            const actionableIssues = issues.filter((issue) => !isMockOrFixtureIssue(issue));
            const excludedCount = issues.length - actionableIssues.length;
            const list = actionableIssues;

            let duplicationSummary = '_Duplication metrics unavailable for this PR._';
            try {
              const measureParams = new URLSearchParams({
                component: projectKey,
                pullRequest: String(prNumber),
                metricKeys: 'duplicated_lines,duplicated_lines_density,new_duplicated_lines,new_duplicated_lines_density',
              });
              const measurePayload = await fetchJSON('/api/measures/component', measureParams);
              const measures = Array.isArray(measurePayload?.component?.measures) ? measurePayload.component.measures : [];
              const getMeasure = (metric) => measures.find((m) => m?.metric === metric)?.value;
              const fmtPercent = (value) => {
                const n = Number(value);
                return Number.isFinite(n) ? `${n.toFixed(2)}%` : 'n/a';
              };
              const fmtInt = (value) => {
                const n = Number(value);
                return Number.isFinite(n) ? `${Math.round(n)}` : 'n/a';
              };
              duplicationSummary = [
                `- Overall duplicated lines: **${fmtInt(getMeasure('duplicated_lines'))}**`,
                `- Overall duplication density: **${fmtPercent(getMeasure('duplicated_lines_density'))}**`,
                `- New duplicated lines: **${fmtInt(getMeasure('new_duplicated_lines'))}**`,
                `- New duplication density: **${fmtPercent(getMeasure('new_duplicated_lines_density'))}**`,
              ].join('\n');
            } catch (error) {
              core.warning(`Failed to fetch Sonar duplication measures: ${error.message}`);
            }

            const issueRows =
              list.length > 0
                ? list
                    .map((issue, idx) => {
                      const severity = String(issue.severity || 'UNKNOWN');
                      const rule = String(issue.rule || 'n/a');
                      const component = String(issue.component || '').split(':').slice(1).join(':') || 'n/a';
                      const line = issue.line ? `:${issue.line}` : '';
                      const message = String(issue.message || '').replace(/\|/g, '\\|').replace(/\n+/g, ' ');
                      return `| ${idx + 1} | ${severity} | \`${rule}\` | \`${component}${line}\` | ${message} |`;
                    })
                    .join('\n')
                : '| - | - | - | - | No open Sonar issues for this PR. |';

            const body = [
              marker,
              '## SonarQube (PR)',
              '',
              `Open issues: **${total}**`,
              `Actionable issues shown (excluding mock/fixture files): **${actionableIssues.length}**`,
              excludedCount > 0 ? `Excluded mock/fixture issues: **${excludedCount}**` : '',
              '',
              '### Duplication',
              duplicationSummary,
              '',
              '### Issues',
              '',
              '<details>',
              `<summary>Open Sonar issues (${actionableIssues.length})</summary>`,
              '',
              '| # | Severity | Rule | Location | Message |',
              '| --- | --- | --- | --- | --- |',
              issueRows,
              '',
              '</details>',
              '',
              `Source: [SonarCloud PR view](${host}/project/issues?id=${encodeURIComponent(projectKey)}&pullRequest=${prNumber}&resolved=false)`,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Comment on coverage failure
        if: ${{ !env.ACT }}
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          COVERAGE_MIN: 98
          COVERAGE_PACKAGE_MIN: 98
        with:
          script: |
            const fs = require('node:fs');

            const reportRoot = 'pr-report-inputs';
            const statusPath = `${reportRoot}/coverage-status.txt`;
            const totalPath = `${reportRoot}/coverage-total.txt`;
            const packageFailuresPath = `${reportRoot}/coverage-package-failures.txt`;

            if (!fs.existsSync(statusPath) || fs.readFileSync(statusPath, 'utf8').trim() === '0') {
              core.info('Coverage gate passed or did not emit a status; skipping PR coverage comment.');
              return;
            }

            const marker = '<!-- lopper-coverage-failure -->';
            const total = fs.existsSync(totalPath) ? fs.readFileSync(totalPath, 'utf8').trim() : 'unavailable';
            const packageFailures = fs.existsSync(packageFailuresPath)
              ? fs.readFileSync(packageFailuresPath, 'utf8').trim()
              : '';
            const packageFailureSection = packageFailures
              ? `Packages below minimum:\n${packageFailures}\n\n`
              : '';
            const body = `${marker}
            ❌ Coverage gate failed.

            Required total: >= ${process.env.COVERAGE_MIN}%
            Actual total: ${total === 'unavailable' ? total : `${total}%`}

            Required per-package: >= ${process.env.COVERAGE_PACKAGE_MIN}%

            ${packageFailureSection}Run \`make cov\` locally for details.`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  verify-rolling:
    name: verify (rolling)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        if: ${{ !env.ACT }}
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Setup Go (act)
        if: ${{ env.ACT }}
        run: |
          if ! command -v go >/dev/null 2>&1; then
            apt-get update
            apt-get install -y golang-go
          fi
          if ! command -v shellcheck >/dev/null 2>&1; then
            apt-get update
            apt-get install -y shellcheck
          fi
          go version

      - name: Install shellcheck
        if: ${{ !env.ACT }}
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install Go tooling
        run: |
          make tools-install
          if [ -z "${ACT:-}" ]; then
            echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          fi

      - name: Fetch PR base
        if: ${{ github.event_name == 'pull_request' }}
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          base_ref="${PR_BASE_REF:-main}"
          git fetch --no-tags --depth=1 origin "${base_ref}"

      - name: Run CI target with rolling defaults
        env:
          BUILD_CHANNEL: rolling
          GH_EVENT_NAME: ${{ github.event_name }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          if [ "${GH_EVENT_NAME}" = "pull_request" ]; then
            base_ref="${PR_BASE_REF:-main}"
            export MEMORY_BENCH_BASE="origin/${base_ref}"
            export MEMORY_BENCH_ENFORCE=0
          fi
          if [ -n "${ACT:-}" ]; then
            PATH="$(go env GOPATH)/bin:$PATH" make ci BUILD_CHANNEL="${BUILD_CHANNEL}"
          else
            make ci BUILD_CHANNEL="${BUILD_CHANNEL}"
          fi

  os-smoke:
    name: os-smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - &ci_smoke_checkout
        name: Checkout
        uses: actions/checkout@v7

      - &ci_smoke_setup_go
        name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Run smoke checks
        run: make smoke

  vscode-smoke:
    name: vscode-smoke (${{ matrix.os }})
    needs: extension-changes
    if: ${{ needs.extension-changes.outputs.vscode_extension == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    permissions:
      contents: read
    steps:
      - *ci_smoke_checkout

      - *ci_smoke_setup_go

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: extensions/vscode-lopper/package-lock.json

      - name: Build local lopper binary
        run: make build

      - name: Install extension dependencies
        run: make vscode-extension-install

      - name: Run VS Code smoke tests
        run: |
          if [ "${RUNNER_OS}" = "Linux" ]; then
            xvfb-run -a make vscode-extension-test
          else
            make vscode-extension-test
          fi

  homebrew-tap-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Detect tap repository
        id: tap
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh repo view ben-ranford/homebrew-tap >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Homebrew
        if: ${{ steps.tap.outputs.exists == 'true' }}
        uses: Homebrew/actions/setup-homebrew@fc695c54c2032716dd4cedd007489c8e32fc8a5d

      - name: Checkout tap formula
        if: ${{ steps.tap.outputs.exists == 'true' }}
        uses: actions/checkout@v7
        with:
          repository: ben-ranford/homebrew-tap
          path: homebrew-tap

      - name: Run Homebrew audit and test
        if: ${{ steps.tap.outputs.exists == 'true' }}
        run: |
          set -euo pipefail
          brew untap ben-ranford/tap >/dev/null 2>&1 || true
          brew tap --custom-remote ben-ranford/tap "file://${PWD}/homebrew-tap"
          brew trust ben-ranford/tap
          brew audit --strict --online ben-ranford/tap/lopper
          export HOMEBREW_NO_SANDBOX_LINUX=1
          brew install --build-from-source ben-ranford/tap/lopper
          brew test ben-ranford/tap/lopper

      - name: Skip when tap is not created yet
        if: ${{ steps.tap.outputs.exists != 'true' }}
        run: echo "homebrew-tap repository not found; skipping Homebrew tap verification."
