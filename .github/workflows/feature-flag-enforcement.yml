name: feature flag enforcement

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review

jobs:
  enforce:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Reset feature flag comment staging
        run: |
          comment_dir="${RUNNER_TEMP}/feature-flag-comment-inputs"
          rm -rf -- "${comment_dir}" .artifacts
          mkdir -- "${comment_dir}" .artifacts

      - name: Fetch PR base
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          base_ref="${PR_BASE_REF:-main}"
          git fetch --no-tags origin "+refs/heads/${base_ref}:refs/remotes/origin/${base_ref}"

      - name: Capture base feature catalog
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          base_ref="${PR_BASE_REF:-main}"
          if git cat-file -e "origin/${base_ref}:internal/featureflags/features.json"; then
            git show "origin/${base_ref}:internal/featureflags/features.json" > .artifacts/previous-features.json
          else
            printf '[]\n' > .artifacts/previous-features.json
          fi

      - name: Classify PR
        id: classify_pr
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          pr_title="$(printf '%s\n' "${PR_TITLE}" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"
          if printf '%s\n' "${pr_title}" | grep -Eq '^(feat|preview)(\([^)]+\))?(!)?:[[:space:]]+[^[:space:]]'; then
            echo "feature_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "feature_pr=false" >> "$GITHUB_OUTPUT"
          fi
          if printf '%s\n' "${pr_title}" | grep -Eq '^preview(\([^)]+\))?(!)?:[[:space:]]+[^[:space:]]'; then
            echo "preview_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "preview_pr=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ "${PR_HEAD_REF}" == release-please--branches--* ]]; then
            echo "release_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reject release overrides on preview PRs
        if: ${{ steps.classify_pr.outputs.preview_pr == 'true' }}
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          base_ref="${PR_BASE_REF:-main}"
          commit_messages="$(mktemp "${RUNNER_TEMP}/preview-commit-messages.XXXXXX")"
          pr_body="$(mktemp "${RUNNER_TEMP}/preview-pr-body.XXXXXX")"
          trap 'rm -f "${commit_messages}" "${pr_body}"' EXIT
          release_directive_pattern='^(BREAKING[ -]CHANGE|Release-As):|(BEGIN|END)_(COMMIT_OVERRIDE|NESTED_COMMIT)'
          non_preview_entry_pattern='^(feat|feature|fix|bug|perf|docs|refactor|revert)(\([^)]+\))?:[[:space:]]+[^[:space:]]|^[[:alnum:]_-]+(\([^)]+\))?!:[[:space:]]+[^[:space:]]'
          printf '%s\n' "${PR_BODY}" > "${pr_body}"
          if grep -Eiq "${release_directive_pattern}" "${pr_body}" || grep -Eiq "${non_preview_entry_pattern}" "${pr_body}"; then
            echo "::error::Preview PR descriptions must not contain release footers, non-preview entries, or release-please override blocks." >&2
            exit 1
          fi
          merge_base="$(git merge-base "origin/${base_ref}" HEAD)"
          git log --format=%B "${merge_base}..HEAD" > "${commit_messages}"
          if grep -Eiq "${release_directive_pattern}" "${commit_messages}"; then
            echo "::error::Preview commits must not contain breaking-change or release-please version override directives." >&2
            exit 1
          fi
          if grep -Eiq "${non_preview_entry_pattern}" "${commit_messages}"; then
            echo "::error::Preview branch commits must not add non-preview release entries or breaking subjects to the squash body." >&2
            exit 1
          fi

      - name: Enforce feature flags on PRs
        id: enforce_flags
        continue-on-error: true
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          go run ./tools/featureflag pr-enforce \
            --pr-title "${PR_TITLE}" \
            --previous-catalog .artifacts/previous-features.json \
            > "${RUNNER_TEMP}/feature-flag-comment-inputs/feature-flag-enforcement.md"

      - name: Fetch tags for release PR guidance
        if: ${{ steps.classify_pr.outputs.release_pr == 'true' }}
        run: git fetch --tags --force

      - name: Capture previous release feature catalog
        if: ${{ steps.classify_pr.outputs.release_pr == 'true' }}
        run: |
          set -euo pipefail
          previous_catalog=".artifacts/previous-release-features.json"
          previous_tag="$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n1)"
          if [ -n "${previous_tag}" ] && git cat-file -e "${previous_tag}:internal/featureflags/features.json" 2>/dev/null; then
            git show "${previous_tag}:internal/featureflags/features.json" > "${previous_catalog}"
          else
            printf '[]\n' > "${previous_catalog}"
          fi

      - name: Write release feature guidance
        if: ${{ steps.classify_pr.outputs.release_pr == 'true' }}
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          RELEASE_WORKFLOW_URL: ${{ format('https://github.com/{0}/actions/workflows/graduate-feature.yml', github.repository) }}
        run: |
          set -euo pipefail
          go run ./tools/featureflag release-pr-comment \
            --pr-title "${PR_TITLE}" \
            --previous-catalog .artifacts/previous-release-features.json \
            --workflow-url "${RELEASE_WORKFLOW_URL}" \
            > "${RUNNER_TEMP}/feature-flag-comment-inputs/release-feature-flag-comment.md"

      - name: Write feature flag summary
        if: ${{ always() }}
        env:
          COMMENT_DIR: ${{ runner.temp }}/feature-flag-comment-inputs
          ENFORCEMENT_FAILED: ${{ steps.enforce_flags.outcome == 'failure' }}
          FEATURE_PR: ${{ steps.classify_pr.outputs.feature_pr }}
          RELEASE_PR: ${{ steps.classify_pr.outputs.release_pr }}
        run: |
          set -euo pipefail
          if [ "${RELEASE_PR}" = "true" ] && [ -s "${COMMENT_DIR}/release-feature-flag-comment.md" ]; then
            cat "${COMMENT_DIR}/release-feature-flag-comment.md" >> "$GITHUB_STEP_SUMMARY"
          elif { [ "${FEATURE_PR}" = "true" ] || [ "${ENFORCEMENT_FAILED}" = "true" ]; } && [ -s "${COMMENT_DIR}/feature-flag-enforcement.md" ]; then
            cat "${COMMENT_DIR}/feature-flag-enforcement.md" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${RELEASE_PR}" = "true" ]; then
            printf '%s\n\n%s\n' \
              '## Release feature flags' \
              '❌ Release feature flag guidance was not produced. Check the workflow logs.' \
              >> "$GITHUB_STEP_SUMMARY"
          elif [ "${FEATURE_PR}" = "true" ] || [ "${ENFORCEMENT_FAILED}" = "true" ]; then
            printf '%s\n\n%s\n' \
              '## Feature flag enforcement' \
              '❌ Feature flag enforcement summary was not produced. Check the workflow logs.' \
              >> "$GITHUB_STEP_SUMMARY"
          else
            printf '%s\n\n%s\n' \
              '## Feature flag enforcement' \
              'Skipped. This PR is neither a feature PR nor a release-please promotion PR.' \
              >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Validate and stage bounded comment inputs
        if: ${{ always() }}
        env:
          COMMENT_DIR: ${{ runner.temp }}/feature-flag-comment-inputs
          ENFORCEMENT_FAILED: ${{ steps.enforce_flags.outcome == 'failure' }}
          FEATURE_PR: ${{ steps.classify_pr.outputs.feature_pr }}
          RELEASE_PR: ${{ steps.classify_pr.outputs.release_pr }}
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        run: |
          for status_name in ENFORCEMENT_FAILED FEATURE_PR RELEASE_PR; do
            status_value="${!status_name}"
            case "${status_value}" in
              true|false) ;;
              *)
                echo "::error::${status_name} must be true or false; got ${status_value}." >&2
                exit 1
                ;;
            esac
            status_path="${COMMENT_DIR}/$(printf '%s' "${status_name}" | tr '[:upper:]' '[:lower:]').txt"
            printf '%s\n' "${status_value}" > "${status_path}"
            if [ ! -f "${status_path}" ] || [ -L "${status_path}" ] || [ ! -s "${status_path}" ]; then
              echo "::error::Status file ${status_path} is missing or unsafe." >&2
              exit 1
            fi
            if [ "$(stat --format=%s "${status_path}")" -gt 8 ]; then
              echo "::error::Status file ${status_path} exceeds the 8-byte bound." >&2
              exit 1
            fi
          done

          if find -P "${COMMENT_DIR}" -mindepth 1 -maxdepth 1 ! -type f -print -quit | grep -q .; then
            echo "::error::Comment inputs contain a non-regular entry." >&2
            exit 1
          fi

          file_count="$(find -P "${COMMENT_DIR}" -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d '[:space:]')"
          if [ "${file_count}" -lt 3 ] || [ "${file_count}" -gt 5 ]; then
            echo "::error::Comment inputs must contain exactly the status files plus up to two summaries." >&2
            exit 1
          fi

          while IFS= read -r path; do
            case "$(basename "${path}")" in
              enforcement_failed.txt|feature_pr.txt|release_pr.txt)
                ;;
              feature-flag-enforcement.md|release-feature-flag-comment.md)
                if [ ! -s "${path}" ]; then
                  echo "::error::Comment summary ${path} is empty." >&2
                  exit 1
                fi
                if [ "$(stat --format=%s "${path}")" -gt 1048576 ]; then
                  echo "::error::Comment summary ${path} exceeds the 1 MiB bound." >&2
                  exit 1
                fi
                ;;
              *)
                echo "::error::Unexpected comment input ${path}." >&2
                exit 1
                ;;
            esac
          done < <(find -P "${COMMENT_DIR}" -mindepth 1 -maxdepth 1 -type f | sort)

      - name: Upload bounded comment inputs
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: feature-flag-comment-inputs
          path: ${{ runner.temp }}/feature-flag-comment-inputs
          if-no-files-found: error

      - name: Fail on feature flag enforcement errors
        if: ${{ steps.enforce_flags.outcome == 'failure' }}
        run: |
          echo "Feature flag enforcement failed. See the summary above for the added flags and any violations."
          exit 1

  publish-comments:
    if: ${{ always() && !cancelled() }}
    needs:
      - enforce
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Download bounded comment inputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: feature-flag-comment-inputs
          path: ${{ runner.temp }}/feature-flag-comment-inputs

      - name: Validate bounded comment inputs
        env:
          COMMENT_DIR: ${{ runner.temp }}/feature-flag-comment-inputs
          PATH: /usr/bin:/bin
        shell: /usr/bin/env -u BASH_ENV -u ENV -u PROMPT_COMMAND -u PS4 -u SHELLOPTS -u BASHOPTS /bin/bash --noprofile --norc -euo pipefail {0}
        run: |
          if find -P "${COMMENT_DIR}" -mindepth 1 -maxdepth 1 ! -type f -print -quit | grep -q .; then
            echo "::error::Downloaded comment inputs contain a non-regular entry." >&2
            exit 1
          fi

          file_count="$(find -P "${COMMENT_DIR}" -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d '[:space:]')"
          if [ "${file_count}" -lt 3 ] || [ "${file_count}" -gt 5 ]; then
            echo "::error::Downloaded comment inputs must contain exactly the status files plus up to two summaries." >&2
            exit 1
          fi

          feature_summary_path=""
          release_summary_path=""

          while IFS= read -r path; do
            case "$(basename "${path}")" in
              enforcement_failed.txt|feature_pr.txt|release_pr.txt)
                if [ ! -f "${path}" ] || [ -L "${path}" ] || [ ! -s "${path}" ]; then
                  echo "::error::Status file ${path} is missing or unsafe." >&2
                  exit 1
                fi
                if [ "$(stat --format=%s "${path}")" -gt 8 ]; then
                  echo "::error::Status file ${path} exceeds the 8-byte bound." >&2
                  exit 1
                fi
                status_value="$(tr -d '[:space:]' < "${path}")"
                case "${status_value}" in
                  true|false) ;;
                  *)
                    echo "::error::Status file ${path} must contain true or false; got ${status_value}." >&2
                    exit 1
                    ;;
                esac
                case "$(basename "${path}")" in
                  enforcement_failed.txt) enforcement_failed="${status_value}" ;;
                  feature_pr.txt) feature_pr="${status_value}" ;;
                  release_pr.txt) release_pr="${status_value}" ;;
                esac
                ;;
              feature-flag-enforcement.md)
                if [ ! -f "${path}" ] || [ -L "${path}" ] || [ ! -s "${path}" ]; then
                  echo "::error::Feature enforcement summary is missing or unsafe." >&2
                  exit 1
                fi
                if [ "$(stat --format=%s "${path}")" -gt 1048576 ]; then
                  echo "::error::Feature enforcement summary exceeds the 1 MiB bound." >&2
                  exit 1
                fi
                feature_summary_path="${path}"
                ;;
              release-feature-flag-comment.md)
                if [ ! -f "${path}" ] || [ -L "${path}" ] || [ ! -s "${path}" ]; then
                  echo "::error::Release feature summary is missing or unsafe." >&2
                  exit 1
                fi
                if [ "$(stat --format=%s "${path}")" -gt 1048576 ]; then
                  echo "::error::Release feature summary exceeds the 1 MiB bound." >&2
                  exit 1
                fi
                release_summary_path="${path}"
                ;;
              *)
                echo "::error::Unexpected comment input ${path}." >&2
                exit 1
                ;;
            esac
          done < <(find -P "${COMMENT_DIR}" -mindepth 1 -maxdepth 1 -type f | sort)

          : "${enforcement_failed:?missing enforcement_failed status}"
          : "${feature_pr:?missing feature_pr status}"
          : "${release_pr:?missing release_pr status}"

          {
            printf 'ENFORCEMENT_FAILED=%s\n' "${enforcement_failed}"
            printf 'FEATURE_PR=%s\n' "${feature_pr}"
            printf 'RELEASE_PR=%s\n' "${release_pr}"
            printf 'FEATURE_SUMMARY_PATH=%s\n' "${feature_summary_path}"
            printf 'RELEASE_SUMMARY_PATH=%s\n' "${release_summary_path}"
          } >> "$GITHUB_ENV"

      - name: Sync feature flag enforcement comment on PR
        if: ${{ !env.ACT }}
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const fs = require('node:fs');

            const marker = '<!-- lopper-feature-flag-enforcement -->';
            const summaryPath = process.env.FEATURE_SUMMARY_PATH;
            const fallbackBody = [
              marker,
              '## Feature flag enforcement',
              '',
              '❌ Feature flag enforcement summary was not produced.',
              '',
              'See the workflow logs for the failure details.',
            ].join('\n');

            let summary = '';
            if (summaryPath && fs.existsSync(summaryPath)) {
              summary = fs.readFileSync(summaryPath, 'utf8').trim();
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.filter(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker),
            );

            const shouldComment =
              process.env.FEATURE_PR === 'true' ||
              process.env.ENFORCEMENT_FAILED === 'true';
            if (!shouldComment) {
              for (const duplicate of existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: duplicate.id,
                });
              }
              return;
            }

            const body = summary || fallbackBody;
            if (existing.length > 0) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing[0].id,
                body,
              });
              for (const duplicate of existing.slice(1)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: duplicate.id,
                });
              }
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Sync release feature guidance comment on PR
        if: ${{ !env.ACT }}
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const fs = require('node:fs');

            const marker = '<!-- lopper-feature-flag-release-pr -->';
            const summaryPath = process.env.RELEASE_SUMMARY_PATH;
            const fallbackBody = [
              marker,
              '## Release feature flags',
              '',
              '❌ Release feature flag guidance was not produced.',
              '',
              'See the workflow logs for the failure details.',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.filter(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker),
            );

            if (process.env.RELEASE_PR !== 'true') {
              for (const duplicate of existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: duplicate.id,
                });
              }
              return;
            }

            const body =
              summaryPath && fs.existsSync(summaryPath)
                ? fs.readFileSync(summaryPath, 'utf8').trim()
                : fallbackBody;

            if (existing.length > 0) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing[0].id,
                body,
              });
              for (const duplicate of existing.slice(1)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: duplicate.id,
                });
              }
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
