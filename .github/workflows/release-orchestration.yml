name: release-orchestration

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      source_sha:
        required: false
        type: string
        default: ''
      artifact_prefix:
        required: true
        type: string
      image_tags:
        required: true
        type: string
      build_channel:
        required: true
        type: string

jobs:
  # Release promotion assumes the selected source commit has already passed
  # the checks required to merge into main.
  build-linux-windows:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha || github.sha }}

      - name: Compute build metadata
        id: build_meta
        run: |
          echo "commit=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install Go tooling
        run: |
          make tools-install
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Linux/Windows release artifacts
        env:
          TAG: ${{ inputs.tag }}
          COMMIT_SHA: ${{ steps.build_meta.outputs.commit }}
          BUILD_DATE: ${{ steps.build_meta.outputs.build_date }}
          BUILD_CHANNEL: ${{ inputs.build_channel }}
        run: |
          make release \
            VERSION="$TAG" \
            GIT_COMMIT="$COMMIT_SHA" \
            BUILD_DATE="$BUILD_DATE" \
            RELEASE_BUILD_CHANNEL="$BUILD_CHANNEL" \
            PLATFORMS="linux/amd64 linux/arm64 windows/amd64 windows/arm64"

      - name: Upload Linux/Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_prefix }}-linux-windows
          path: |
            dist/*.tar.gz
            dist/*.zip

  build-darwin:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha || github.sha }}

      - name: Compute build metadata
        id: build_meta
        run: |
          echo "commit=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install shellcheck
        run: brew install shellcheck

      - name: Install Go tooling
        run: |
          make tools-install
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Darwin release artifact
        env:
          TAG: ${{ inputs.tag }}
          COMMIT_SHA: ${{ steps.build_meta.outputs.commit }}
          BUILD_DATE: ${{ steps.build_meta.outputs.build_date }}
          BUILD_CHANNEL: ${{ inputs.build_channel }}
        run: |
          host_goarch="$(go env GOARCH)"
          make release \
            VERSION="$TAG" \
            GIT_COMMIT="$COMMIT_SHA" \
            BUILD_DATE="$BUILD_DATE" \
            RELEASE_BUILD_CHANNEL="$BUILD_CHANNEL" \
            PLATFORMS="darwin/${host_goarch}"

      - name: Upload Darwin artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_prefix }}-darwin
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish-ghcr-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha || github.sha }}

      - name: Compute image metadata
        id: image_meta
        run: |
          echo "commit=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Compute image name
        id: image
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/lopper" >> "$GITHUB_OUTPUT"

      - name: Compute amd64 image tags
        id: image_tags
        shell: bash
        env:
          IMAGE_TAGS: ${{ inputs.image_tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              echo "${{ steps.image.outputs.name }}:${tag}-amd64"
            fi
          done <<< "$IMAGE_TAGS" > image-tags.txt
          {
            echo 'tags<<EOF'
            cat image-tags.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 release image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            VERSION=${{ inputs.tag }}
            GIT_COMMIT=${{ steps.image_meta.outputs.commit }}
            BUILD_DATE=${{ steps.image_meta.outputs.build_date }}
            BUILD_CHANNEL=${{ inputs.build_channel }}
          labels: |
            org.opencontainers.image.created=${{ steps.image_meta.outputs.build_date }}
            org.opencontainers.image.revision=${{ inputs.source_sha || github.sha }}
            org.opencontainers.image.version=${{ inputs.tag }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image_tags.outputs.tags }}
          provenance: false
          sbom: true

  publish-ghcr-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha || github.sha }}

      - name: Compute image metadata
        id: image_meta
        run: |
          echo "commit=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Compute image name
        id: image
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/lopper" >> "$GITHUB_OUTPUT"

      - name: Compute arm64 image tags
        id: image_tags
        shell: bash
        env:
          IMAGE_TAGS: ${{ inputs.image_tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              echo "${{ steps.image.outputs.name }}:${tag}-arm64"
            fi
          done <<< "$IMAGE_TAGS" > image-tags.txt
          {
            echo 'tags<<EOF'
            cat image-tags.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 release image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            VERSION=${{ inputs.tag }}
            GIT_COMMIT=${{ steps.image_meta.outputs.commit }}
            BUILD_DATE=${{ steps.image_meta.outputs.build_date }}
            BUILD_CHANNEL=${{ inputs.build_channel }}
          labels: |
            org.opencontainers.image.created=${{ steps.image_meta.outputs.build_date }}
            org.opencontainers.image.revision=${{ inputs.source_sha || github.sha }}
            org.opencontainers.image.version=${{ inputs.tag }}
          push: true
          platforms: linux/arm64
          tags: ${{ steps.image_tags.outputs.tags }}
          provenance: false
          sbom: true

  publish-ghcr-manifest:
    needs:
      - publish-ghcr-amd64
      - publish-ghcr-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Compute image name
        id: image
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/lopper" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch manifests
        shell: bash
        env:
          IMAGE_TAGS: ${{ inputs.image_tags }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              docker buildx imagetools create \
                -t "${IMAGE_NAME}:${tag}" \
                "${IMAGE_NAME}:${tag}-amd64" \
                "${IMAGE_NAME}:${tag}-arm64"
              docker buildx imagetools inspect "${IMAGE_NAME}:${tag}"
            fi
          done <<< "$IMAGE_TAGS"
